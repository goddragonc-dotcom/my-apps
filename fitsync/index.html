<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitSync">
<meta name="theme-color" content="#0c0c0f">
<title>FitSync — AI 피트니스 코치</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0f; --s1:#131318; --s2:#1a1a22; --s3:#22222d;
  --bd:#2a2a38; --bd2:#363650;
  --or:#ff5c2b; --or2:#ff7a4d; --orD:#ff5c2b22;
  --grn:#39e07a; --grnD:#39e07a18;
  --blu:#3b9eff; --bluD:#3b9eff18;
  --yel:#ffd234; --yelD:#ffd23418;
  --red:#ff4466; --redD:#ff446618;
  --t1:#f0f0f8; --t2:#8888aa; --t3:#44445a;
  --font:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Bebas Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;}

/* ── 노이즈 텍스처 ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}

/* ── 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;z-index:1;}
#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--bd);}
.logo{font-family:var(--display);font-size:26px;letter-spacing:3px;color:var(--or);}
.logo span{color:var(--t1);}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--t3);font-family:var(--mono);margin-top:-4px;}
.header-badge{background:var(--orD);border:1px solid var(--or);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--or);font-family:var(--mono);}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:20px;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── 바텀 탭 ── */
#tabs{flex-shrink:0;display:grid;grid-template-columns:repeat(7,1fr);background:var(--s1);border-top:1px solid var(--bd);padding:6px 0 max(10px,env(safe-area-inset-bottom));}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;}
.tab-btn .ti{font-size:16px;filter:grayscale(1) opacity(.4);transition:all .2s;}
.tab-btn .tl{font-size:8px;font-weight:700;color:var(--t3);transition:color .2s;font-family:var(--mono);}
.tab-btn.active .ti{filter:none;}
.tab-btn.active .tl{color:var(--or);}

/* ── 뷰 ── */
.view{display:none;padding:16px 18px;animation:fadeUp .25s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── 공통 카드 ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-family:var(--mono);display:flex;align-items:center;gap:6px;}
.card-title span{font-size:13px;}

/* ── 섹션 라벨 ── */
.sec-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin:18px 0 10px;padding:0 2px;}

/* ── 버튼 ── */
.btn-primary{width:100%;background:var(--or);color:#fff;border:none;padding:13px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,92,43,.35);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{width:100%;background:none;color:var(--t2);border:1px solid var(--bd);padding:10px;border-radius:12px;font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-ghost:hover{border-color:var(--bd2);color:var(--t1);}
.btn-sm{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:5px 12px;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-sm.active,.btn-sm:hover{background:var(--orD);border-color:var(--or);color:var(--or);}
.btn-icon{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px;transition:color .2s;}
.btn-icon:hover{color:var(--t1);}

/* ── 폼 ── */
.form-row{margin-bottom:12px;}
.form-label{font-size:10px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;letter-spacing:.5px;font-family:var(--mono);}
.form-input,.form-select{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:10px 12px;border-radius:10px;font-family:var(--font);font-size:13px;width:100%;transition:border-color .2s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(255,92,43,.1);}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ── 진행바 ── */
.prog-wrap{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.prog-row{display:grid;grid-template-columns:60px 1fr 48px;align-items:center;gap:8px;margin-bottom:8px;}
.prog-label{font-size:10px;color:var(--t2);font-family:var(--mono);}
.prog-val{font-size:10px;text-align:right;font-family:var(--mono);}

/* ── 체크박스 운동 ── */
.exercise-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;transition:all .2s;cursor:pointer;}
.exercise-item.done{border-color:var(--grn);background:rgba(57,224,122,.04);}
.exercise-item.done .ex-name{text-decoration:line-through;color:var(--t3);}
.ex-check{width:22px;height:22px;border:2px solid var(--bd2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.exercise-item.done .ex-check{background:var(--grn);border-color:var(--grn);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.ex-detail{font-size:10px;color:var(--t2);font-family:var(--mono);}
.ex-badge{font-size:9px;background:var(--orD);color:var(--or);border:1px solid var(--or);padding:1px 7px;border-radius:100px;font-family:var(--mono);flex-shrink:0;}

/* ── 링 차트 ── */
.ring-wrap{position:relative;width:100px;height:100px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ring-num{font-family:var(--display);font-size:24px;color:var(--or);line-height:1;}
.ring-lbl{font-size:8px;color:var(--t3);font-family:var(--mono);margin-top:1px;}

/* ── 통계 그리드 ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center;}
.stat-num{font-family:var(--display);font-size:28px;line-height:1;margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--t2);font-family:var(--mono);}

/* ── 라인 차트 ── */
.line-chart-wrap{width:100%;overflow:hidden;}

/* ── 알림 배너 ── */
.banner{border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;font-size:12px;line-height:1.6;}
.banner.info{background:var(--bluD);border:1px solid rgba(59,158,255,.25);}
.banner.warn{background:var(--yelD);border:1px solid rgba(255,210,52,.25);}
.banner.success{background:var(--grnD);border:1px solid rgba(57,224,122,.25);}
.banner.danger{background:var(--redD);border:1px solid rgba(255,68,102,.25);}
.banner-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── 업로드 존 ── */
.upload-zone{border:2px dashed var(--bd2);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .3s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--or);background:var(--orD);}
.upload-zone .uz-icon{font-size:40px;margin-bottom:10px;display:block;}
.upload-zone h3{font-size:15px;font-weight:700;margin-bottom:5px;}
.upload-zone p{font-size:11px;color:var(--t2);line-height:1.6;}

/* ── 태그 칩 ── */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--mono);}
.chip.or{background:var(--orD);color:var(--or);border:1px solid var(--or);}
.chip.grn{background:var(--grnD);color:var(--grn);border:1px solid var(--grn);}
.chip.blu{background:var(--bluD);color:var(--blu);border:1px solid var(--blu);}
.chip.yel{background:var(--yelD);color:var(--yel);border:1px solid var(--yel);}
.chip.red{background:var(--redD);color:var(--red);border:1px solid var(--red);}
.chip.gray{background:var(--s3);color:var(--t2);border:1px solid var(--bd);}

/* ── 스켈레톤 ── */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 토스트 ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bd2);color:var(--t1);padding:10px 18px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;max-width:320px;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 온보딩 스텝 ── */
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:all .3s;}
.step-dot.active{width:20px;border-radius:3px;background:var(--or);}
.step-dot.done{background:var(--grn);}

/* ── 목표 선택 카드 ── */
.goal-card{background:var(--s2);border:2px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;}
.goal-card:hover{border-color:var(--bd2);}
.goal-card.selected{border-color:var(--or);background:var(--orD);}
.goal-card .gc-icon{font-size:28px;margin-bottom:6px;display:block;}
.goal-card .gc-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.goal-card .gc-desc{font-size:10px;color:var(--t2);line-height:1.4;}

/* ── 인바디 결과 ── */
.inbody-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.inbody-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;}
.inbody-val{font-family:var(--display);font-size:22px;line-height:1;margin-bottom:2px;}
.inbody-lbl{font-size:9px;color:var(--t2);font-family:var(--mono);}

/* ── 운동 플랜 탭 ── */
.day-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:6px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.day-tab.active{background:var(--orD);border-color:var(--or);color:var(--or);}
.day-tab.rest{opacity:.5;}

/* ── 영양 연동 바 ── */
.nutr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);}
.nutr-row:last-child{border-bottom:none;}
.nutr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nutr-name{font-size:12px;color:var(--t2);width:52px;flex-shrink:0;font-family:var(--mono);}
.nutr-bar-wrap{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.nutr-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.nutr-val{font-size:10px;font-family:var(--mono);text-align:right;width:64px;flex-shrink:0;}

/* ── 프로그레스 히스토리 ── */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:11px;color:var(--t2);font-family:var(--mono);}
.history-vals{display:flex;gap:12px;}
.history-val{font-size:11px;font-family:var(--mono);}

/* ── AI 로딩 ── */
.ai-loading{text-align:center;padding:32px 20px;}
.ai-ring{width:40px;height:40px;border:3px solid var(--bd2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-loading p{font-size:12px;color:var(--t2);line-height:1.8;}

/* ── 주간 바 차트 ── */
.week-bars{display:flex;gap:4px;align-items:flex-end;height:60px;margin:10px 0 4px;}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.week-bar-col .wb{border-radius:3px 3px 0 0;min-height:2px;transition:height .5s ease;width:100%;}
.week-bar-col .wd{font-size:9px;color:var(--t3);font-family:var(--mono);}
.week-bar-col.today .wd{color:var(--or);font-weight:700;}

/* ── 섹션 구분선 ── */
.divider{height:1px;background:var(--bd);margin:16px 0;}

/* ── 스크롤 힌트 ── */
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── AI 코멘트 박스 ── */
.ai-box{background:linear-gradient(135deg,rgba(255,92,43,.06),transparent);border:1px solid rgba(255,92,43,.2);border-radius:14px;padding:14px;}
.ai-box-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-box-title{font-size:12px;font-weight:700;color:var(--or);}
.ai-score{font-family:var(--display);font-size:36px;color:var(--or);line-height:1;}

/* ── 설정 섹션 ── */
.setting-section h4{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
.setting-row:last-child{border-bottom:none;}
.setting-key{font-size:12px;color:var(--t2);}
.setting-val{font-size:12px;font-weight:700;color:var(--t1);font-family:var(--mono);}

/* ── 온보딩 전용 ── */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.ob-header{padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
.ob-logo{font-family:var(--display);font-size:28px;letter-spacing:3px;color:var(--or);}
.ob-skip{font-size:12px;color:var(--t3);cursor:pointer;padding:4px;}
.ob-body{flex:1;overflow-y:auto;padding:10px 20px 20px;}
.ob-title{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:6px;}
.ob-subtitle{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.6;}
.ob-footer{padding:12px 20px max(20px,env(safe-area-inset-bottom));}
</style>
</head>
<body>

<!-- ══ 온보딩 ══ -->
<div id="onboarding">
  <div class="ob-header">
    <div class="ob-logo">FIT<span style="color:var(--t1)">SYNC</span></div>
    <span class="ob-skip" onclick="skipOnboarding()">건너뛰기</span>
  </div>
  <div class="ob-body" id="ob-body"></div>
  <div class="ob-footer">
    <div class="step-dots" id="ob-dots"></div>
    <button class="btn-primary" id="ob-next-btn" onclick="obNext()">다음 →</button>
  </div>
</div>

<!-- ══ 메인 앱 ══ -->
<div id="app" style="display:none;">
  <div id="header">
    <div>
      <div class="logo">FIT<span>SYNC</span></div>
      <div class="logo-sub">AI PERSONAL TRAINER</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="/" style="display:inline-flex;align-items:center;gap:5px;background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.25);border-radius:100px;padding:4px 11px;font-size:10px;font-weight:700;color:#c8f135;text-decoration:none;">🍽 NutriLens</a>
      <div class="header-badge" id="header-badge">●  ACTIVE</div>
    </div>
  </div>

  <div id="content">
    <!-- TODAY -->
    <div class="view active" id="view-today"></div>
    <!-- PLAN -->
    <div class="view" id="view-plan"></div>
    <!-- NUTRITION -->
    <div class="view" id="view-nutrition"></div>
    <!-- PROGRESS -->
    <div class="view" id="view-progress"></div>
    <!-- INBODY -->
    <div class="view" id="view-inbody"></div>
    <!-- REBAL -->
    <div class="view" id="view-rebal"></div>
    <!-- SETTINGS -->
    <div class="view" id="view-settings"></div>
  </div>

  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('today')" id="tab-today"><span class="ti">🏋️</span><span class="tl">TODAY</span></button>
    <button class="tab-btn" onclick="switchTab('plan')" id="tab-plan"><span class="ti">📋</span><span class="tl">플랜</span></button>
    <button class="tab-btn" onclick="switchTab('nutrition')" id="tab-nutrition"><span class="ti">🥗</span><span class="tl">영양</span></button>
    <button class="tab-btn" onclick="switchTab('progress')" id="tab-progress"><span class="ti">📈</span><span class="tl">성과</span></button>
    <button class="tab-btn" onclick="switchTab('inbody')" id="tab-inbody"><span class="ti">⚡</span><span class="tl">인바디</span></button>
    <button class="tab-btn" onclick="switchTab('rebal')" id="tab-rebal"><span class="ti">⚖️</span><span class="tl">리밸런싱</span></button>
    <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings"><span class="ti">⚙️</span><span class="tl">설정</span></button>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// 스토리지
// ════════════════════════════════════════════════════════
const SK = 'fitsync_v1';
const AK = 'fitsync_apikey';

const LS = {
  load: () => { try { const s = localStorage.getItem(SK); return s ? JSON.parse(s) : null; } catch { return null; } },
  save: (d) => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} },
};

const SEED = {
  profile: null,   // 온보딩 후 설정
  goals: [],       // ['muscle','diet','endurance','health']

const today = () => new Date().toISOString().slice(0, 10);
const fmt = (n, d = 0) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });
const fmtW = (n) => `₩${fmt(Math.abs(Math.round(n)))}`;
const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];

let _toastTimer = null;
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const colors = { info: '#3b9eff', success: '#39e07a', warn: '#ffd234', error: '#ff4466' };
  t.textContent = msg;
  t.style.borderColor = colors[type] || colors.info;
  t.style.color = colors[type] || colors.info;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function tryJSON(str) {
  if (!str) return null;
  let s = str.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(s); } catch {}
  const i = s.indexOf('{'), j = s.lastIndexOf('}');
  if (i !== -1 && j > i) try { return JSON.parse(s.slice(i, j + 1)); } catch {}
  return null;
}

async function callClaude({ system, userText, imageBase64, imageMime, maxTokens = 1500 }) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API 키를 설정 탭에서 입력해주세요');

  const userContent = [];
  if (imageBase64) userContent.push({ type: 'image', source: { type: 'base64', media_type: imageMime || 'image/jpeg', data: imageBase64 } });
  userContent.push({ type: 'text', text: userText });

  const resp = await fetch('/api/claude-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      system: [{ type: 'text', text: system, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: userContent }],
    }),
  });
  const data = await resp.json();
  if (!resp.ok || data.error) throw new Error(data.error?.message || `API 오류 ${resp.status}`);
  return data.content?.find(c => c.type === 'text')?.text || '';
}

// 이미지 최적화
function optimizeImage(dataUrl) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const r = Math.min(700 / img.width, 1);
      const c = document.createElement('canvas');
      c.width = img.width * r; c.height = img.height * r;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.7).split(',')[1]);
    };
    img.src = dataUrl;
  });
}

async function handleInbodyUpload(input) {

  if (!file) return;
  const zone = document.getElementById('ob-inbody-zone');
  zone.innerHTML = '<span class="uz-icon">⏳</span><h3>분석 중...</h3>';

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const b64 = await optimizeImage(e.target.result);
      const text = await callClaude({
        system: '당신은 인바디 분석 전문가입니다. 인바디 결과지 이미지에서 데이터를 추출하여 JSON으로만 응답하세요.\n{"weight":0,"fatPct":0,"muscleMass":0,"bmi":0,"bmr":0,"visceralFat":0,"bodyWater":0,"rightArm":0,"leftArm":0,"torso":0,"rightLeg":0,"leftLeg":0}',
        userText: '이 인바디 결과지에서 수치를 추출해주세요. JSON만 출력하세요.',
        imageBase64: b64, maxTokens: 600,
      });
      const result = tryJSON(text);
      if (result) {
        STATE._tempInbody = result;
        const el = document.getElementById('ob-inbody-result');
        el.style.display = 'block';
        el.innerHTML = `
          <div class="banner success"><span class="banner-icon">✅</span><div>인바디 데이터 추출 완료!</div></div>
          <div class="inbody-grid">
            ${[['체중', result.weight, 'kg'], ['체지방률', result.fatPct, '%'], ['골격근량', result.muscleMass, 'kg'],
               ['BMI', result.bmi, ''], ['기초대사량', result.bmr, 'kcal'], ['내장지방', result.visceralFat, '레벨']].map(([l, v, u]) =>
               `<div class="inbody-item"><div class="inbody-val" style="color:var(--or)">${v || '–'}</div><div class="inbody-lbl">${l}${u ? ' ('+u+')' : ''}</div></div>`).join('')}
          </div>`;
        if (result.fatPct) document.getElementById('ob-fat-pct').value = result.fatPct;
        if (result.muscleMass) document.getElementById('ob-muscle').value = result.muscleMass;
        if (result.bmi) document.getElementById('ob-bmi').value = result.bmi;
        zone.innerHTML = `<span class="uz-icon">✅</span><h3>분석 완료</h3><p>다른 사진으로 다시 시도하려면 클릭</p><input type="file" id="ob-inbody-file" accept="image/*" style="display:none" onchange="handleInbodyUpload(this)">`;

    }
  };
  reader.readAsDataURL(file);
}

    if (STATE.profile) STATE.profile.durationMonths = +document.getElementById('ob-duration').value;

    const bmi = parseFloat(document.getElementById('ob-bmi').value);

        fatPct: fatPct || 0, muscleMass: muscle || 0, bmi: bmi || 0,
        ...(STATE._tempInbody || {}),
      };
      STATE.inbodyHistory = [inbodyEntry];
      delete STATE._tempInbody;
    }
  }
  if (OB_STEPS[obStep].id === 'apikey') {
    const k = document.getElementById('ob-apikey').value.trim();
    if (k) setApiKey(k);

  }
  save();
  obStep++;
  renderObStep();
}

    <!-- 플랜 재조정 체크 -->

      <div class="banner warn" style="margin-top:12px;">

      </div>` : ''}
  `;
}

function toggleExercise(dateKey, idx) {
  if (!STATE.logs[dateKey]) STATE.logs[dateKey] = {};
  const current = STATE.logs[dateKey][idx]?.done || false;
  STATE.logs[dateKey][idx] = { done: !current, toggledAt: Date.now() };
  save();
  renderToday();
}

function checkPlanAdjustNeeded() {
  const logs = STATE.workoutLogs || [];
  const recent = logs.slice(-3);
  return recent.length === 3 && recent.every(l => l.completionRate < 0.5);
}

function getNutriLensData() {
  try {
    const raw = localStorage.getItem('nutrilens_fitsync_daily');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.date !== today()) return null; // 오늘 데이터만
    return data;
  } catch { return null; }
}

function renderNutritionMini(nutrData, plan) {
  if (!nutrData) {
    return `<div class="card" style="text-align:center;padding:20px;">
      <div style="font-size:13px;color:var(--t2);margin-bottom:10px;">NutriLens 연동 대기 중</div>
      <div style="font-size:11px;color:var(--t3);line-height:1.7;">NutriLens에서 식단을 기록하면<br>자동으로 여기에 표시됩니다</div>
    </div>`;
  }
  const t = nutrData.totals;
  const goals = computeNutritionGoals(plan);
  const items = [
    { name: '단백질', val: t.protein, goal: goals.protein, unit: 'g', color: '#ff6b6b' },
    { name: '칼로리', val: t.calories, goal: goals.calories, unit: 'kcal', color: 'var(--or)' },
    { name: '탄수화물', val: t.carbs, goal: goals.carbs, unit: 'g', color: '#ffd93d' },
    { name: '지방', val: t.fat, goal: goals.fat, unit: 'g', color: '#6bcb77' },
  ];
  return `<div class="card">
    ${items.map(it => {
      const pct = Math.min((it.val / it.goal) * 100, 100);
      const over = it.val > it.goal * 1.05;
      return `<div class="nutr-row">
        <div class="nutr-dot" style="background:${it.color}"></div>
        <div class="nutr-name">${it.name}</div>
        <div class="nutr-bar-wrap"><div class="nutr-bar" style="width:${pct}%;background:${over ? 'var(--red)' : it.color}"></div></div>
        <div class="nutr-val" style="color:${over ? 'var(--red)' : it.color}">${it.val}/${it.goal}${it.unit}</div>
      </div>`;
    }).join('')}
    ${t.protein < goals.protein * 0.8 ? `
      <div class="banner warn" style="margin-top:10px;">
        <span class="banner-icon">⚡</span>
        <div>단백질 ${goals.protein - t.protein}g 부족 — 운동 후 단백질 보충이 필요해요</div>
      </div>` : ''}
  </div>`;
}

function computeNutritionGoals(plan) {
  const p = STATE.profile || {};
  const w = p.weight || 70;
  const hasMusclGoal = (STATE.goals || []).includes('muscle');
  const protein = Math.round(w * (hasMusclGoal ? 1.8 : 1.4));
  const bmr = p.gender === 'female'
    ? 10 * w + 6.25 * (p.height || 165) - 5 * (p.age || 30) - 161
    : 10 * w + 6.25 * (p.height || 175) - 5 * (p.age || 30) + 5;
  const calories = Math.round(bmr * 1.55) + (hasMusclGoal ? 300 : 0);
  const fat = Math.round(calories * 0.27 / 9);
  const carbs = Math.round((calories - protein * 4 - fat * 9) / 4);
  return { protein, calories, fat, carbs };
}

async function generatePlan() {
  const p = STATE.profile;
  if (!p) { toast('프로필을 먼저 입력해주세요', 'warn'); switchTab('settings'); return; }

  const btn = document.getElementById('gen-plan-btn');
  const loading = document.getElementById('plan-loading');
  if (btn) btn.disabled = true;
  if (loading) loading.style.display = 'block';

  const inbody = STATE.inbodyHistory?.[STATE.inbodyHistory.length - 1];
  const goalLabels = { muscle:'근육 증가', diet:'체지방 감소', endurance:'체력 향상', health:'건강 유지' };
  const goalStr = (STATE.goals || ['health']).map(g => goalLabels[g] || g).join(', ');

  const system = `당신은 전문 퍼스널 트레이너입니다. 사용자 데이터를 바탕으로 1주 운동 플랜을 JSON으로만 생성하세요.
형식:
{"weeks":[{"week":1,"days":[{"dayOfWeek":"월","focus":"가슴+삼두","isRest":false,"exercises":[{"name":"벤치프레스","sets":4,"reps":"8-10","weight":"60kg","rest":90,"tip":"팁"}]}]}],"nutritionGuide":{"dailyProtein":140,"dailyCalories":2400,"mealTiming":"운동 후 30분 내 단백질 섭취"}}
규칙: 주당 운동일수 엄수, 휴식일은 isRest:true로 표시, 불균형 부위 보완 운동 포함, 점진적 과부하 원칙 적용, JSON만 출력`;

  const userText = `사용자 정보:
- 나이: ${p.age}세, 키: ${p.height}cm, 몸무게: ${p.weight}kg, 성별: ${p.gender === 'male' ? '남' : '여'}
- 주당 운동: ${p.weeklyFreq}회, 경력: ${p.level}
- 목표: ${goalStr}
${inbody ? `- 체지방률: ${inbody.fatPct}%, 골격근량: ${inbody.muscleMass}kg, BMI: ${inbody.bmi}` : ''}
위 정보로 최적화된 주간 운동 플랜을 생성해주세요.`;

  try {
    const text = await callClaude({ system, userText, maxTokens: 2500 });
    const result = tryJSON(text);
    if (!result?.weeks?.length) throw new Error('플랜 파싱 실패');
    STATE.plan = { ...result, generatedAt: today(), adjustmentCount: (STATE.plan?.adjustmentCount || 0) + 1 };
    save();
    toast('✅ 운동 플랜 생성 완료!', 'success');
    renderPlan();
    renderToday();
  } catch (e) {
    toast('플랜 생성 실패: ' + e.message, 'error');
  } finally {
    if (btn) btn.disabled = false;
    if (loading) loading.style.display = 'none';
  }
}

// PROGRESS 탭 — 성과 추적
// ════════════════════════════════════════════════════════
function renderProgress() {
  const el = document.getElementById('view-progress');
  const logs = STATE.workoutLogs || [];
  const days7 = last7Days();

  // 주간 운동 완료 데이터
  const weekData = days7.map(d => {
    const log = STATE.logs[d] || {};
    const plan = STATE.plan;
    const todayPlan = plan?.weeks?.[0]?.days?.find(day => {
      const dow = new Date(d).getDay();
      return day.dayOfWeek === ['일','월','화','수','목','금','토'][dow];
    });
    const total = todayPlan?.exercises?.length || 0;
    const done = total ? Object.values(log).filter(v => v.done).length : 0;
    return { date: d, done, total, rate: total ? done / total : 0 };
  });

  const totalDays = weekData.filter(d => d.total > 0).length;
  const avgRate = totalDays ? weekData.filter(d => d.total > 0).reduce((s, d) => s + d.rate, 0) / totalDays : 0;
  const streak = calcStreak();

  el.innerHTML = `
    <div style="font-size:18px;font-weight:900;margin-bottom:14px;">📈 성과 추적</div>

    <!-- 핵심 지표 -->
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-num" style="color:var(--or);">${streak}</div>
        <div class="stat-lbl">연속 운동일</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--grn);">${Math.round(avgRate * 100)}%</div>
        <div class="stat-lbl">주간 완료율</div>
      </div>

function calcStreak() {
  let streak = 0;
  const today_d = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today_d);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const log = STATE.logs[key];
    if (log && Object.values(log).some(v => v.done)) streak++;
    else break;
  }
  return streak;
}

function renderInbodyTimeline() {
  const history = STATE.inbodyHistory || [];
  if (history.length < 2) return '';
  const first = history[0], last = history[history.length - 1];
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;">
      ${[['체지방률', first.fatPct, last.fatPct, '%', false],
         ['골격근량', first.muscleMass, last.muscleMass, 'kg', true],
         ['체중', first.weight, last.weight, 'kg', false]].map(([l, s, e, u, upGood]) => {
        const diff = e - s;
        const good = upGood ? diff > 0 : diff < 0;
        const color = diff === 0 ? 'var(--t2)' : good ? 'var(--grn)' : 'var(--red)';
        return `<div class="inbody-item">
          <div class="inbody-val" style="color:${color}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}${u}</div>
          <div class="inbody-lbl">${l} 변화</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);font-family:var(--mono);">
      <span>${first.date}</span><span>→</span><span>${last.date}</span>
    </div>`;
}

async function handleInbodyNew(input) {
  const file = input.files[0];
  if (!file) return;
  const zone = document.getElementById('inbody-zone');
  const resultEl = document.getElementById('inbody-upload-result');
  zone.innerHTML = `<span class="uz-icon">⏳</span><h3>분석 중...</h3><p>잠시 기다려주세요</p>`;

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const b64 = await optimizeImage(e.target.result);
      const text = await callClaude({
        system: '당신은 인바디 분석 전문가입니다. 인바디 결과지에서 수치를 추출하여 JSON으로만 응답하세요.\n{"weight":0,"fatPct":0,"muscleMass":0,"bmi":0,"bmr":0,"visceralFat":0,"bodyWater":0,"rightArm":0,"leftArm":0,"torso":0,"rightLeg":0,"leftLeg":0}\n모든 값은 숫자로, JSON만 출력하세요.',
        userText: '인바디 결과지 수치를 추출해주세요. JSON만 출력.',
        imageBase64: b64, maxTokens: 600,
      });
      const result = tryJSON(text);
      if (!result?.weight) throw new Error('데이터 추출 실패');

      // 저장
      const entry = { date: today(), ...result, source: 'ocr' };
      if (!STATE.inbodyHistory) STATE.inbodyHistory = [];
      STATE.inbodyHistory.push(entry);
      if (STATE.profile) STATE.profile.weight = result.weight;
      save();

      resultEl.innerHTML = `
        <div class="banner success"><span class="banner-icon">✅</span><div>인바디 데이터 저장 완료!</div></div>
        <div class="inbody-grid">
          ${[['체중', result.weight, 'kg'], ['체지방률', result.fatPct, '%'], ['골격근량', result.muscleMass, 'kg'],
             ['BMI', result.bmi, ''], ['기초대사량', result.bmr, 'kcal'], ['내장지방', result.visceralFat, 'lv']].map(([l, v, u]) =>
             `<div class="inbody-item"><div class="inbody-val" style="color:var(--or)">${v||'–'}</div><div class="inbody-lbl">${l}${u?' ('+u+')':''}</div></div>`).join('')}
        </div>`;
      zone.innerHTML = `<span class="uz-icon">✅</span><h3>완료 — 다시 업로드하려면 클릭</h3><input type="file" id="inbody-file" accept="image/*" style="display:none" onchange="handleInbodyNew(this)">`;
      toast('✅ 인바디 저장 완료!', 'success');
    } catch (e) {
      toast('분석 실패: ' + e.message, 'error');
      zone.innerHTML = `<span class="uz-icon">📋</span><h3>다시 시도</h3><p>${e.message}</p><input type="file" id="inbody-file" accept="image/*" style="display:none" onchange="handleInbodyNew(this)">`;
    }
  };
  reader.readAsDataURL(file);
}

    fatPct: parseFloat(document.getElementById('ib-fatpct').value) || 0,
    muscleMass: parseFloat(document.getElementById('ib-muscle').value) || 0,
    bmi: parseFloat(document.getElementById('ib-bmi').value) || 0,

  if (!STATE.inbodyHistory) STATE.inbodyHistory = [];

function renderMuscleBalance() {
  const inbody = STATE.inbodyHistory?.[STATE.inbodyHistory.length - 1];
  if (!inbody?.rightArm) return `
    <div class="banner info">
      <span class="banner-icon">💡</span>

    </div>`;

  const segs = [
    { name: '오른팔', val: inbody.rightArm },
    { name: '왼팔', val: inbody.leftArm },
    { name: '몸통', val: inbody.torso },
    { name: '오른다리', val: inbody.rightLeg },
    { name: '왼다리', val: inbody.leftLeg },
  ].filter(s => s.val);

  if (!segs.length) return '';
  const maxVal = Math.max(...segs.map(s => s.val));
  const armDiff = inbody.rightArm && inbody.leftArm ? Math.abs(inbody.rightArm - inbody.leftArm) : 0;

  return `
    <div class="sec-label">부위별 근육 분포</div>
    <div class="card">
      <div class="card-title"><span>🦾</span> 인바디 기반 불균형 분석</div>
      ${segs.map(s => {
        const pct = s.val / maxVal * 100;
        return `<div class="prog-row">
          <div class="prog-label">${s.name}</div>
          <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:var(--or)"></div></div>
          <div class="prog-val" style="color:var(--or)">${s.val}kg</div>
        </div>`;
      }).join('')}
      ${armDiff > 0.3 ? `<div class="banner warn" style="margin-top:10px;"><span class="banner-icon">⚠️</span><div>팔 좌우 불균형 ${armDiff.toFixed(1)}kg — 플랜에 보완 운동 포함됩니다</div></div>` : ''}
    </div>`;
}

    <!-- 온보딩 재시작 -->
    <button class="btn-ghost" onclick="STATE.onboardingDone=false;save();location.reload();">🔄 온보딩 다시 시작</button>
  `;
}

function saveApiKeyFromSettings() {
  const k = document.getElementById('s-apikey').value.trim();
  if (!k) { toast('API 키를 입력해주세요', 'warn'); return; }
  setApiKey(k);
  toast('✅ API 키 저장됨', 'success');
  renderSettings();
}

function saveProfile() {
  const age = +document.getElementById('s-age').value;
  const height = +document.getElementById('s-height').value;
  const weight = +document.getElementById('s-weight').value;
  if (!age || !height || !weight) { toast('나이, 키, 몸무게를 입력해주세요', 'warn'); return; }
  STATE.profile = {
    ...(STATE.profile || {}),
    age, height, weight,
    gender: document.getElementById('s-gender').value,
    weeklyFreq: +document.getElementById('s-freq').value,
    level: document.getElementById('s-level').value,
    durationMonths: +document.getElementById('s-duration').value,
  };
  save();
  toast('✅ 프로필 저장됨', 'success');
}

function toggleGoalSetting(key, btn) {
  if (!STATE.goals) STATE.goals = [];
  const i = STATE.goals.indexOf(key);
  if (i >= 0) { STATE.goals.splice(i, 1); btn.classList.remove('active'); }
  else { STATE.goals.push(key); btn.classList.add('active'); }
  save();
}

// ════════════════════════════════════════════════════════
// 앱 초기화
// ════════════════════════════════════════════════════════
if (STATE.onboardingDone) {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderToday();
} else {
  renderObStep();
}
</script>
</body>
</html>
