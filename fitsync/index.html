<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0f">
<title>FitSync</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0f;--s1:#131318;--s2:#1a1a22;--s3:#22222d;
  --bd:#2a2a38;--bd2:#363650;
  --or:#ff5c2b;--or2:#ff7a4d;--orD:rgba(255,92,43,.12);
  --grn:#39e07a;--grnD:rgba(57,224,122,.12);
  --blu:#3b9eff;--bluD:rgba(59,158,255,.12);
  --yel:#ffd234;--yelD:rgba(255,210,52,.12);
  --red:#ff4466;--redD:rgba(255,68,102,.12);
  --pur:#a78bfa;--purD:rgba(167,139,250,.12);
  --t1:#f0f0f8;--t2:#8888aa;--t3:#44445a;
  --font:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Bebas Neue',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
/* 헤더 */
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid var(--bd);background:var(--bg)}
.logo{font-family:var(--display);font-size:26px;letter-spacing:3px;color:var(--or)}.logo span{color:var(--t1)}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--t3);font-family:var(--mono);margin-top:-4px}
.hdr-r{display:flex;align-items:center;gap:8px}
.nutr-link{display:inline-flex;align-items:center;gap:4px;background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.25);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:#c8f135;text-decoration:none}
.badge{background:var(--orD);border:1px solid var(--or);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--or);font-family:var(--mono)}
/* 콘텐츠 */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:16px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
/* 탭 */
#tabs{flex-shrink:0;display:grid;grid-template-columns:repeat(6,1fr);background:var(--s1);border-top:1px solid var(--bd);padding:6px 0 max(10px,var(--safe-bottom))}
.tb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0}
.tb .ti{font-size:18px;filter:grayscale(1) opacity(.35);transition:all .2s}
.tb .tl{font-size:8px;font-weight:700;color:var(--t3);transition:color .2s;font-family:var(--mono)}
.tb.on .ti{filter:none}.tb.on .tl{color:var(--or)}
/* 뷰 */
.view{display:none;padding:16px 18px;animation:fu .22s ease}
.view.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* 카드 */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);border-radius:16px 16px 0 0}
.ct{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.sl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin:16px 0 8px;padding:0 2px}
/* 버튼 */
.btn{width:100%;background:var(--or);color:#fff;border:none;padding:13px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,92,43,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.ghost{background:none;color:var(--t2);border:1px solid var(--bd);margin-top:8px}
.btn.ghost:hover{border-color:var(--bd2);color:var(--t1)}
.btn.sm{width:auto;padding:5px 12px;font-size:11px;background:var(--s2);color:var(--t2);border:1px solid var(--bd)}
.btn.sm.on,.btn.sm:hover{background:var(--orD);border-color:var(--or);color:var(--or)}
.btn.sm.red.on{background:var(--redD);border-color:var(--red);color:var(--red)}
.btn.sm.grn{background:var(--grnD);border-color:var(--grn);color:var(--grn)}
/* 폼 */
.fl{font-size:10px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;letter-spacing:.5px;font-family:var(--mono)}
.fi,.fs{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:10px 12px;border-radius:10px;font-family:var(--font);font-size:13px;width:100%;-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(255,92,43,.08)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* 배너 */
.bn{border-radius:12px;padding:11px 13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;font-size:12px;line-height:1.6}
.bn.info{background:var(--bluD);border:1px solid rgba(59,158,255,.2)}
.bn.warn{background:var(--yelD);border:1px solid rgba(255,210,52,.2)}
.bn.ok{background:var(--grnD);border:1px solid rgba(57,224,122,.2)}
.bn.err{background:var(--redD);border:1px solid rgba(255,68,102,.2)}
.bn.pur{background:var(--purD);border:1px solid rgba(167,139,250,.2)}
.bni{font-size:16px;flex-shrink:0;margin-top:1px}
/* 진행바 */
.pw{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
/* 링 */
.ring{position:relative}.ring svg{transform:rotate(-90deg)}
.ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-n{font-family:var(--display);color:var(--or);line-height:1}
.ring-l{font-size:8px;color:var(--t3);font-family:var(--mono);margin-top:1px}
/* 칩 */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--mono)}
.chip.or{background:var(--orD);color:var(--or);border:1px solid var(--or)}
.chip.grn{background:var(--grnD);color:var(--grn);border:1px solid var(--grn)}
.chip.blu{background:var(--bluD);color:var(--blu);border:1px solid var(--blu)}
.chip.yel{background:var(--yelD);color:var(--yel);border:1px solid var(--yel)}
.chip.red{background:var(--redD);color:var(--red);border:1px solid var(--red)}
/* AI 로딩 */
.ail{text-align:center;padding:28px 20px}
.air{width:38px;height:38px;border:3px solid var(--bd2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ail p{font-size:12px;color:var(--t2);line-height:1.8}
/* 업로드존 */
.uz{border:2px dashed var(--bd2);border-radius:16px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .3s}
.uz:hover,.uz.drag{border-color:var(--or);background:var(--orD)}
.uz .ui{font-size:34px;margin-bottom:8px;display:block}
.uz h3{font-size:14px;font-weight:700;margin-bottom:4px}
.uz p{font-size:11px;color:var(--t2);line-height:1.6}
/* 요일 선택 */
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.db{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:8px 0;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.db.on{background:var(--orD);border-color:var(--or);color:var(--or)}
/* 플랜 탭 */
.pdt{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.pdt::-webkit-scrollbar{display:none}
.pdb{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:6px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.pdb.on{background:var(--orD);border-color:var(--or);color:var(--or)}
.pdb.rest{opacity:.5}
/* +/- 인풋 */
.spin-wrap{display:flex;align-items:center;gap:0;background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.spin-btn{background:none;border:none;color:var(--t2);font-size:18px;padding:0 10px;height:40px;cursor:pointer;transition:all .15s;flex-shrink:0}
.spin-btn:hover{color:var(--or);background:var(--orD)}
.spin-btn:active{background:var(--or);color:#fff}
.spin-val{flex:1;background:none;border:none;color:var(--t1);font-family:var(--mono);font-size:16px;font-weight:700;text-align:center;padding:0;height:40px;min-width:0}
.spin-val:focus{outline:none}
/* 실행 탭 */
.edots{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.edot{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:all .3s}
.edot.done{background:var(--grn)}.edot.cur{background:var(--or);width:20px;border-radius:4px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 44px;gap:6px;align-items:center;margin-bottom:8px}
.sn{font-family:var(--display);font-size:17px;color:var(--t3);text-align:center}
.sn.cur{color:var(--or)}.sn.done{color:var(--grn)}
.set-done-btn{padding:0;height:40px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-size:14px;cursor:pointer;transition:all .2s;width:100%}
.set-done-btn.done{background:var(--grn);border-color:var(--grn);color:#000}
.set-done-btn:disabled{opacity:.3;cursor:not-allowed}
/* 타이머 */
.timer-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin:8px 0}
.timer-fill{height:100%;background:var(--or);border-radius:2px;transition:width 1s linear}
/* 가이드 패널 */
.gp{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-top:10px}
.gp h4{font-size:11px;font-weight:700;color:var(--or);margin-bottom:8px;font-family:var(--mono)}
.gs{font-size:12px;line-height:1.8;color:var(--t2);margin-bottom:3px}
.gtip{background:var(--orD);border:1px solid rgba(255,92,43,.15);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;line-height:1.6}
/* SVG 운동 그림 */
.ex-fig{width:100%;height:130px;background:var(--s2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;border:1px solid var(--bd)}
.ex-fig svg{width:100%;height:100%}
/* 대안 버튼 */
.alt-pill{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:var(--pur);padding:5px 11px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font)}
.alt-pill:hover{background:rgba(167,139,250,.2);border-color:var(--pur)}
.alt-pill.active{background:var(--purD);border-color:var(--pur)}
/* 볼륨 */
.vr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vn{font-size:11px;color:var(--t2);width:44px;flex-shrink:0;font-family:var(--mono)}
.vbw{flex:1;height:7px;background:var(--s3);border-radius:4px;overflow:hidden}
.vb{height:100%;border-radius:4px;transition:width .6s ease}
.vv{font-size:10px;font-family:var(--mono);white-space:nowrap;text-align:right;min-width:72px}
/* 칼로리/영양 */
.nr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}
.nr:last-child{border-bottom:none}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nn{font-size:11px;color:var(--t2);width:48px;flex-shrink:0;font-family:var(--mono)}
.nbw{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.nb{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.nv{font-size:10px;font-family:var(--mono);text-align:right;min-width:68px}
/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-hdr{text-align:center;font-size:10px;color:var(--t3);font-family:var(--mono);padding:4px 0}
.cal-day{min-height:52px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:4px;cursor:pointer;transition:all .2s;position:relative}
.cal-day:hover{border-color:var(--bd2)}
.cal-day.today{border-color:var(--or);background:var(--orD)}
.cal-day.has-workout{border-color:rgba(57,224,122,.3)}
.cal-day.empty{background:none;border-color:transparent;cursor:default}
.cal-dn{font-size:11px;font-weight:700;text-align:right;margin-bottom:2px}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%}
/* 인바디 proof */
.pr-row{display:grid;grid-template-columns:88px 1fr 30px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.pr-row:last-child{border-bottom:none}
.pr-l{font-size:11px;color:var(--t2);font-family:var(--mono)}
.pr-i{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:6px 8px;border-radius:8px;font-family:var(--mono);font-size:13px;width:100%;text-align:right}
.pr-i:focus{outline:none;border-color:var(--or)}
.pr-i.warn{border-color:var(--yel)}.pr-i.ok{border-color:var(--grn)}
/* 설정 */
.sr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.sr:last-child{border-bottom:none}
.sk{font-size:12px;color:var(--t2)}.sv{font-size:12px;font-weight:700;font-family:var(--mono)}
/* 모달 */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:flex-end;justify-content:center}
.mb{background:var(--s1);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:24px 20px max(24px,var(--safe-bottom));width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.mb::-webkit-scrollbar{display:none}
.mt{font-size:17px;font-weight:900;margin-bottom:16px}
/* 컨디션 모달 */
.cmo{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.cmb{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center}
.cems{display:flex;justify-content:center;gap:12px;margin:18px 0}
.cem{font-size:28px;background:none;border:2px solid transparent;border-radius:12px;padding:8px;cursor:pointer;transition:all .2s}
.cem.on{border-color:var(--or);background:var(--orD)}
/* 피드백 마무리 모달 */
.fb-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.fb-row:last-child{border-bottom:none}
.fb-btns{display:flex;gap:6px}
.fb-btn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;transition:all .2s}
.fb-btn.on{border-color:var(--or);background:var(--orD)}
/* 세션 완료 */
.summary-stat{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center}
.summary-num{font-family:var(--display);font-size:32px;line-height:1;margin-bottom:3px}
.summary-lbl{font-size:10px;color:var(--t2);font-family:var(--mono)}
/* 스텝 모달 */
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:all .3s}
.step-dot.on{width:20px;border-radius:3px;background:var(--or)}
.step-dot.done{background:var(--grn)}
/* 토스트 */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bd2);color:var(--t1);padding:9px 18px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;max-width:300px;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* 온보딩 */
#ob{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.ob-hdr{padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.ob-logo{font-family:var(--display);font-size:28px;letter-spacing:3px;color:var(--or)}
.ob-skip{font-size:12px;color:var(--t3);cursor:pointer;padding:4px}
.ob-body{flex:1;overflow-y:auto;padding:8px 20px 20px}
.ob-ftr{padding:10px 20px max(20px,var(--safe-bottom))}
.gc{background:var(--s2);border:2px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.gc.on{border-color:var(--or);background:var(--orD)}
.gc .gi{font-size:26px;margin-bottom:5px;display:block}
.gc .gn{font-size:12px;font-weight:700;margin-bottom:2px}
.gc .gd{font-size:10px;color:var(--t2);line-height:1.4}
/* 플랜 생성 스텝 모달 */
.ps-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:450;display:flex;align-items:flex-end;justify-content:center}
.ps-box{background:var(--s1);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:24px 20px max(28px,var(--safe-bottom));width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
/* stat grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sb{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center}
.sbn{font-family:var(--display);font-size:28px;line-height:1;margin-bottom:2px}
.sbl{font-size:10px;color:var(--t2);font-family:var(--mono)}
/* 스크롤x */
.sx{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
.sx::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<!-- ══ 컨디션 모달 ══ -->
<div class="cmo" id="cmo" style="display:none">
  <div class="cmb">
    <div style="font-size:10px;color:var(--t2);font-family:var(--mono);letter-spacing:1px;margin-bottom:4px">TODAY CHECK-IN</div>
    <div style="font-size:20px;font-weight:900;margin-bottom:4px">오늘 컨디션은?</div>
    <div class="cems">
      <button class="cem" onclick="setCond(1)">😴</button>
      <button class="cem" onclick="setCond(2)">😓</button>
      <button class="cem" onclick="setCond(3)">😐</button>
      <button class="cem" onclick="setCond(4)">😊</button>
      <button class="cem" onclick="setCond(5)">💪</button>
    </div>
    <div id="cond-msg" style="font-size:11px;color:var(--t2);min-height:18px;line-height:1.6"></div>
  </div>
</div>

<!-- ══ 플랜 생성 스텝 모달 ══ -->
<div class="ps-overlay" id="ps-overlay" style="display:none">
  <div class="ps-box" id="ps-box"><!-- JS로 채움 --></div>
</div>

<!-- ══ 운동 가이드 모달 ══ -->
<div class="mo" id="guide-mo" style="display:none" onclick="if(event.target===this)closeGuide()">
  <div class="mb" id="guide-mb"></div>
</div>

<!-- ══ 피드백 마무리 모달 ══ -->
<div class="mo" id="fb-mo" style="display:none">

const SK='fitsync_v21',AK='fitsync_apikey';
const LS={
  load:()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}},
  save:d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}
};
const SEED={
  profile:null, goals:[], preferredDays:[], injuryZones:[],
  plan:null, planTargets:null,
  logs:{},
  inbodyHistory:[],
  conditionLog:{}, postponed:{},
  apiKey:'', onboardingDone:false,
  sessionStart:null,
};
let STATE=LS.load()||{...SEED};
['preferredDays','injuryZones','conditionLog','postponed'].forEach(k=>{if(!STATE[k])STATE[k]=k.includes('Day')||k.includes('Zone')?[]:{}; });
if(!STATE.planTargets)STATE.planTargets=null;

function save(){LS.save(STATE);}
function getKey(){return localStorage.getItem(AK)||STATE.apiKey||'';}
function setKey(k){localStorage.setItem(AK,k);STATE.apiKey=k;save();}

const today=()=>new Date().toISOString().slice(0,10);

const last7=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);});

let _tt=null;
function toast(msg,type){
  type=type||'info';
  const t=document.getElementById('toast');
  const c={info:'#3b9eff',ok:'#39e07a',warn:'#ffd234',err:'#ff4466'};
  t.textContent=msg;t.style.borderColor=c[type]||c.info;t.style.color=c[type]||c.info;
  t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('on');},3000);
}
function tryJSON(s){
  if(!s)return null;
  s=s.replace(/[\x60]{3}json\s*/gi,'').replace(/[\x60]{3}\s*/g,'').trim();
  try{return JSON.parse(s);}catch(e){}
  const i=s.indexOf('{'),j=s.lastIndexOf('}');
  if(i>=0&&j>i)try{return JSON.parse(s.slice(i,j+1));}catch(e){}
  return null;
}
function fmtDate(d){return d?d.slice(5).replace('-','/'):''}
function clamp(v,min,max){return Math.min(Math.max(v,min),max);}

// ════════════════════════════════════════
// Claude API
// ════════════════════════════════════════
async function callClaude(opts){
  const system=opts.system,userText=opts.userText,imageBase64=opts.imageBase64,imageMime=opts.imageMime,maxTokens=opts.maxTokens||1500;
  const key=getKey();
  if(!key)throw new Error('API 키를 설정에서 입력해주세요');
  const uc=[];
  if(imageBase64)uc.push({type:'image',source:{type:'base64',media_type:imageMime||'image/jpeg',data:imageBase64}});
  uc.push({type:'text',text:userText});
  const resp=await fetch('/api/claude-proxy',{
    method:'POST',headers:{'Content-Type':'application/json','x-api-key':key},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,
      system:[{type:'text',text:system,cache_control:{type:'ephemeral'}}],
      messages:[{role:'user',content:uc}]})
  });
  const data=await resp.json();
  if(!resp.ok||data.error)throw new Error(data.error&&data.error.message||('API 오류 '+resp.status));
  return data.content&&data.content.find(function(c){return c.type==='text';})&&data.content.find(function(c){return c.type==='text';}).text||'';
}
function optImg(dataUrl){
  return new Promise(function(res){
    const img=new Image();
    img.onload=function(){
      const r=Math.min(700/img.width,1);
      const c=document.createElement('canvas');
      c.width=img.width*r;c.height=img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',.7).split(',')[1]);
    };
    img.src=dataUrl;
  });
}

let _curTab='home';
function goTab(tab){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('v-'+tab).classList.add('on');
  document.getElementById('tb-'+tab).classList.add('on');
  _curTab=tab;
  document.getElementById('content').scrollTop=0;
  var renders={home:renderHome,exec:renderExec,plan:renderPlan,cal:renderCal,inbody:renderInbody,settings:renderSettings};
  if(renders[tab])renders[tab]();
}

function exSVG(name){
  if(!name)return null;
  var key=null;
  var keys=Object.keys(SVG_KEYS);
  for(var i=0;i<keys.length;i++){

  }
  return key&&SVG_DATA[key]?SVG_DATA[key]:null;
}

function getGuide(name){
  if(!name)return null;
  var keys=Object.keys(EX_GUIDE);
  var key=keys.find(function(k){return name.indexOf(k.split(' ')[0])>=0||k.indexOf(name.split(' ')[0])>=0;});
  return key?EX_GUIDE[key]:null;
}
function getAlts(guide){
  if(!guide)return[];
  var inj=STATE.injuryZones||[];
  var alts=(guide.alt||[]).slice();
  inj.forEach(function(z){
    if(guide.injury&&guide.injury[z])alts=[...guide.injury[z],...alts.filter(function(a){return !guide.injury[z].includes(a);})];
  });
  return alts.slice(0,5);
}

function showGuide(name){
  var guide=getGuide(name);
  var svg=exSVG(name);
  var alts=getAlts(guide);
  var mo=document.getElementById('guide-mo');
  var steps=guide?guide.steps.map(function(s,i){return '<div class="gs">'+(i+1)+'. '+s+'</div>';}).join(''):'';
  var altBtns=alts.map(function(a){return '<button class="alt-pill" onclick="showGuide(\''+a+'\')">'+a+'</button>';}).join('');
  document.getElementById('guide-mb').innerHTML=
    '<div class="mt">📖 '+name+'</div>'+
    (svg?'<div class="ex-fig">'+svg+'</div>':'')+
    (guide?
      '<div class="gp"><h4>✅ 수행 순서</h4>'+steps+
      '<div class="gtip">'+guide.tip+'</div>'+
      (guide.warn?'<div style="font-size:11px;color:var(--yel);margin-top:8px;line-height:1.6;">'+guide.warn+'</div>':'')+
      '</div>'+
      (alts.length?'<div style="margin-top:12px;"><div class="ct"><span>🔄</span>대안 운동</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+altBtns+'</div></div>':'')
    :'<div style="font-size:12px;color:var(--t2);">가이드 정보가 없습니다.</div>')+
    '<button class="btn ghost" onclick="closeGuide()" style="margin-top:16px">닫기</button>';
  mo.style.display='flex';
}

function obNext(){

  if(step==='profile'){
    const age=+document.getElementById('ob-age').value;

    if(!age||!height||!weight){toast('나이, 키, 몸무게를 입력해주세요','warn');return;}
    STATE.profile={...(STATE.profile||{}),age,height,weight,
      gender:document.getElementById('ob-gender').value,
      weeklyFreq:+document.getElementById('ob-freq').value,
      level:document.getElementById('ob-level').value};
  } else if(step==='goals'){
    if(!STATE.goals?.length){toast('목표를 하나 이상 선택해주세요','warn');return;}
  } else if(step==='apikey'){
    const k=document.getElementById('ob-apikey').value.trim();
    if(k)setKey(k);
    STATE.onboardingDone=true;save();finishOb();return;

  save();_obStep++;renderOb();
}

function checkCond(){
  if(!STATE.conditionLog)STATE.conditionLog={};
  if(STATE.conditionLog[today()])return;
  setTimeout(()=>{document.getElementById('cmo').style.display='flex';},600);
}
function setCond(val){
  document.querySelectorAll('.cem').forEach((b,i)=>b.classList.toggle('on',i+1===val));
  const msgs=['','😴 많이 피곤하군요. 강도 60%로 조정할게요','😓 컨디션 저조. 강도 80%로 조정할게요','😐 보통이군요! 계획대로 해봐요','😊 좋은 컨디션! 열심히 합시다','💪 최고! PB에 도전해봐요'];
  const m=document.getElementById('cond-msg');
  if(m)m.textContent=msgs[val]||'';
  setTimeout(()=>{
    if(!STATE.conditionLog)STATE.conditionLog={};
    STATE.conditionLog[today()]=val;save();
    document.getElementById('cmo').style.display='none';
    if(val<=2)toast(`오늘 강도 ${Math.round(getCondScale()*100)}%로 조정됐어요 💙`,'info');
    renderHome();
  },1000);
}
function getCondScale(){
  const c=STATE.conditionLog?.[today()]||3;
  return c<=1?.6:c<=2?.8:1;
}

  const i=STATE.preferredDays.indexOf(idx);
  if(i>=0){STATE.preferredDays.splice(i,1);el.classList.remove('on');}
  else if(STATE.preferredDays.length<freq){STATE.preferredDays.push(idx);el.classList.add('on');}
  else{toast(`최대 ${freq}개까지 선택 가능해요`,'warn');return;}
  save();
  const m=document.getElementById('ps-day-msg');
  if(m)m.textContent=`${STATE.preferredDays.length}/${freq}개 선택됨`;
}
function togglePsInjury(key,el){
  if(!STATE.injuryZones)STATE.injuryZones=[];
  const i=STATE.injuryZones.indexOf(key);
  if(i>=0){STATE.injuryZones.splice(i,1);el.classList.remove('on','red');}

function togglePsGoal(key,el){

  const btn=document.getElementById('ps-gen-btn');
  const loading=document.getElementById('ps-loading');

  if(loading)loading.style.display='block';

  const p=STATE.profile||{};
  const inbody=STATE.inbodyHistory?.slice(-1)[0];
  const goalMap={muscle:'근육 증가',diet:'체지방 감소',endurance:'체력 향상',health:'건강 유지'};
  const injMap={shoulder:'어깨',knee:'무릎',back:'허리',wrist:'손목',elbow:'팔꿈치',hip:'고관절'};
  const dayNames=['일','월','화','수','목','금','토'];
  const selDays=(STATE.preferredDays||[]).map(i=>dayNames[i]);
  const goalStr=(STATE.goals||[]).map(g=>goalMap[g]).join(', ');
  const injStr=(STATE.injuryZones||[]).map(z=>injMap[z]).join(', ')||'없음';

  // 경력별 무게 가이드라인
  const weightGuide=p.level==='beginner'?
    `초보자 무게 가이드 (RPE 6-7 수준):
- 벤치프레스/체스트프레스: 체중의 20~35% (${p.weight?Math.round(p.weight*.25):20}~${p.weight?Math.round(p.weight*.35):25}kg)
- 스쿼트: 체중의 30~50% (${p.weight?Math.round(p.weight*.35):25}~${p.weight?Math.round(p.weight*.45):35}kg)
- 레그프레스: 체중의 50~70% (${p.weight?Math.round(p.weight*.55):35}~${p.weight?Math.round(p.weight*.65):45}kg)
- 오버헤드프레스: 체중의 15~25% (${p.weight?Math.round(p.weight*.18):12}~${p.weight?Math.round(p.weight*.22):16}kg)
- 덤벨 운동: 4~12kg 범위에서 시작
- 반드시 가벼운 무게로 시작해 폼을 익힌 뒤 점진적으로 증량`:
    p.level==='intermediate'?'중급자: RPE 7-8 수준, 체중의 60-80% 기준':'고급자: RPE 8-9, 개인 최대 중량 기준';

  const system=`당신은 전문 퍼스널 트레이너입니다. 사용자 데이터를 분석해 1주 운동 플랜을 JSON으로만 반환하세요.
형식: {"reason":"플랜 이유 (인바디 약점, 주의부위 대체, 목표 반영 등 3~4문장)","weeks":[{"week":1,"days":[{"dayOfWeek":"월","focus":"가슴+삼두","isRest":false,"exercises":[{"name":"체스트프레스","sets":3,"reps":"10-12","weight":"30kg","rest":90,"tip":"팁"}]}]}],"nutritionGuide":{"dailyProtein":120,"dailyCalories":2200,"mealTiming":"운동 후 30분 내 단백질 섭취"}}
규칙:
- reason: 플랜 이유 한국어 상세 설명 필수
- 선택 요일(${selDays.join(',')})만 운동일로 생성, 나머지는 반드시 isRest:true
- 주의부위(${injStr}) 관련 운동은 안전한 대안으로 100% 대체 (reason에 명시)
- ${weightGuide}
- 초보자는 세트수 2-3세트, 중급 3-4세트, 고급 4-5세트
- JSON만 출력`;

  const userText=`나이:${p.age}세/키:${p.height}cm/체중:${p.weight}kg/성별:${p.gender==='male'?'남':'여'}
경력:${p.level}/목표:${goalStr}/선택요일:${selDays.join(',')}/주의부위:${injStr}
${inbody?`인바디: 체지방률 ${inbody.fatPct}%/골격근량 ${inbody.muscleMass}kg/BMI ${inbody.bmi}
팔: 오른 ${inbody.rightArm||'-'}kg 왼 ${inbody.leftArm||'-'}kg/다리: 오른 ${inbody.rightLeg||'-'}kg 왼 ${inbody.leftLeg||'-'}kg`:'인바디 데이터 없음'}`;

  try{
    const text=await callClaude({system,userText,maxTokens:2500});
    const result=tryJSON(text);
    if(!result?.weeks?.length)throw new Error('플랜 파싱 실패');
    // 선택 요일 검증 및 보정
    const days=result.weeks[0].days;
    days.forEach(d=>{
      const dow=['일','월','화','수','목','금','토'].indexOf(d.dayOfWeek);
      if(dow>=0&&!selDays.includes(d.dayOfWeek)){d.isRest=true;d.exercises=[];}
    });
    STATE.plan={...result,generatedAt:today(),adjustmentCount:(STATE.plan?.adjustmentCount||0)+1};
    save();
    toast('✅ 플랜 생성 완료!','ok');
    closePlanSetup();
    renderPlan();renderHome();
  }catch(e){
    toast('플랜 생성 실패: '+e.message,'err');
  }finally{
    if(btn)btn.disabled=false;
    if(loading)loading.style.display='none';
  }
}

function calcStreak(){
  let s=0;const td=new Date();
  for(let i=0;i<365;i++){const d=new Date(td);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const l=STATE.logs[k];if(l&&Object.values(l).some(v=>v.sets?.some(s=>s.done)))s++;else break;}
  return s;
}
function getNutr(){try{const r=localStorage.getItem('nutrilens_fitsync_daily');if(!r)return null;const d=JSON.parse(r);return d.date===today()?d:null;}catch{return null;}}
function calcGoals(plan){
  const p=STATE.profile||{};const w=p.weight||70;const hasM=(STATE.goals||[]).includes('muscle');
  const protein=Math.round(w*(hasM?1.8:1.4));
  const bmr=p.gender==='female'?10*w+6.25*(p.height||165)-5*(p.age||30)-161:10*w+6.25*(p.height||175)-5*(p.age||30)+5;
  const cal=Math.round(bmr*1.55)+(hasM?300:0);
  return{protein,calories:cal,fat:Math.round(cal*.27/9),carbs:Math.round((cal-protein*4-cal*.27)/4)};
}
function renderNutrMini(nutr,goals){
  if(!nutr)return`<div class="card" style="text-align:center;padding:18px;"><div style="font-size:12px;color:var(--t2);">NutriLens 연동 대기 중</div><div style="font-size:10px;color:var(--t3);margin-top:4px;line-height:1.7;">NutriLens에서 오늘 식단을 기록하면<br>자동으로 여기에 표시됩니다</div></div>`;
  const t=nutr.totals;
  return`<div class="card">${[['단백질',t.protein,goals.protein,'g','#ff6b6b'],['칼로리',t.calories,goals.calories,'kcal','var(--or)'],['탄수화물',t.carbs,goals.carbs,'g','#ffd93d'],['지방',t.fat,goals.fat,'g','#6bcb77']].map(([n,v,g,u,c])=>{
    const pct=Math.min(v/g*100,100);const ov=v>g*1.05;
    return`<div class="nr"><div class="nd" style="background:${c}"></div><div class="nn">${n}</div><div class="nbw"><div class="nb" style="width:${pct}%;background:${ov?'var(--red)':c}"></div></div><div class="nv" style="color:${ov?'var(--red)':c}">${v}/${g}${u}</div></div>`;
  }).join('')}</div>`;
}

function spinVal(id,delta,min,max){
  const el=document.getElementById(id);if(!el)return;
  const v=parseFloat(el.value)||0;
  el.value=Math.round(clamp(v+delta,min,max)*10)/10;
}

function switchExercise(idx,name){
  _activeExName[idx]=_activeExName[idx]===name?null:name;
  renderExec();
}

function toggleGuidePanel(){
  const b=document.getElementById('gp-body'),ic=document.getElementById('gp-icon');
  if(!b)return;const o=b.style.display==='none';
  b.style.display=o?'block':'none';if(ic)ic.textContent=o?'▲ 접기':'▼ 펼치기';
}

function completeSet(si){
  const plan=STATE.plan,dow=new Date().getDay(),dn=DAY7[dow];
  const ex=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dn)?.exercises?.[_execIdx];
  const tk=today();
  if(!STATE.logs[tk])STATE.logs[tk]={};
  if(!STATE.logs[tk][_execIdx])STATE.logs[tk][_execIdx]={sets:[],feedback:null};
  const reps=parseInt(document.getElementById(`reps-${_execIdx}-${si}`)?.value)||parseInt(ex?.reps)||10;
  const weight=parseFloat(document.getElementById(`wt-${_execIdx}-${si}`)?.value)||0;
  STATE.logs[tk][_execIdx].sets[si]={reps,weight,done:true};
  // activeExName 저장
  if(_activeExName[_execIdx])STATE.logs[tk][_execIdx].activeExName=_activeExName[_execIdx];
  save();

  // 마지막 세트인지 체크
  const sets=parseInt(ex?.sets)||3;
  const isLastSet=(si===sets-1);
  const plan2=STATE.plan,exes=plan2?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dn)?.exercises||[];
  const isLastEx=(_execIdx===exes.length-1);

  if(isLastSet){
    if(isLastEx){
      // 마지막 운동 마지막 세트 → 세션 완료
      stopTimer();
      setTimeout(()=>showFeedbackModal(exes),500);
    } else {
      // 마지막 세트 → 타이머 후 다음 운동
      const restTime=parseInt(ex?.rest)||90;
      startTimerAutoNext(restTime,restTime);
    }
  } else {
    // 일반 세트 완료 → 타이머
    const restTime=parseInt(ex?.rest)||90;
    startTimer(restTime);
  }
  renderExec();
}

function prevEx(){if(_execIdx>0){_execIdx--;stopTimer();renderExec();}}
function nextEx(){
  const plan=STATE.plan,dow=new Date().getDay(),dn=DAY7[dow];
  const exes=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dn)?.exercises||[];
  if(_execIdx<exes.length-1){_execIdx++;stopTimer();renderExec();}
  else{stopTimer();showFeedbackModal(exes);}
}

// 타이머
function startTimer(sec){
  stopTimer();_timerTotal=sec;_timerRemain=sec;
  const disp=document.getElementById('timer-disp'),fill=document.getElementById('timer-fill');
  _timerInterval=setInterval(()=>{
    _timerRemain--;
    if(disp)disp.textContent=_timerRemain+'s';
    if(fill)fill.style.width=(_timerRemain/_timerTotal*100)+'%';
    if(_timerRemain<=0){stopTimer();toast('⏱ 휴식 완료! 다음 세트!','info');}
  },1000);
}
function startTimerAutoNext(sec,total){
  stopTimer();_timerTotal=total;_timerRemain=sec;
  const disp=document.getElementById('timer-disp'),fill=document.getElementById('timer-fill');
  _timerInterval=setInterval(()=>{
    _timerRemain--;
    if(disp)disp.textContent=_timerRemain+'s';
    if(fill)fill.style.width=(_timerRemain/_timerTotal*100)+'%';
    if(_timerRemain<=0){
      stopTimer();
      toast('⏱ 다음 운동으로 이동!','ok');
      _execIdx++;
      setTimeout(()=>renderExec(),300);
    }
  },1000);
}
function stopTimer(){if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}}

function setFb(idx,val,el,total){
  _sessionFeedback[idx]=val;

  el.closest('.fb-row').querySelectorAll('.fb-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');

  if(Object.keys(_sessionFeedback).length===total){
    const action=document.getElementById('fb-action');
    const msg=document.getElementById('fb-summary-msg');
    const easy=Object.values(_sessionFeedback).filter(v=>v==='easy').length;
    const hard=Object.values(_sessionFeedback).filter(v=>v==='hard').length;
    let text='';
    if(easy>=total*.6)text=`😊 대부분의 운동이 쉬웠군요! 다음 세션에 무게를 올려볼까요?`;
    else if(hard>=total*.6)text=`😓 운동이 힘들었군요. 다음 세션 강도를 낮춰볼까요?`;
    else text='💪 적절한 강도였어요! 현재 플랜을 유지할게요.';
    if(msg)msg.innerHTML=`<span class="bni">📊</span><div>${text}</div>`;
    if(action)action.style.display='block';

async function adjustPlanByFeedback(){
  const btn=document.getElementById('fb-adjust-btn');
  if(btn)btn.disabled=true;
  if(btn)btn.textContent='조정 중...';
  const plan=STATE.plan;
  if(!plan){toast('플랜 없음','err');return;}
  const easy=Object.values(_sessionFeedback).filter(v=>v==='easy').length;
  const hard=Object.values(_sessionFeedback).filter(v=>v==='hard').length;
  const total=Object.keys(_sessionFeedback).length;
  const direction=easy>=total*.6?'increase':hard>=total*.6?'decrease':'maintain';
  if(direction==='maintain'){toast('현재 플랜이 최적이에요!','ok');closeFbModal();return;}
  const dow=new Date().getDay();
  const dn=DAY7[dow];
  const exes=plan.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dn)?.exercises||[];
  try{
    const system=`운동 난이도 피드백을 바탕으로 운동 계획을 조정해주세요. JSON만 반환: {"adjustments":[{"name":"운동명","newWeight":"새무게kg","newReps":"새횟수","reason":"이유"}],"summary":"전체 조정 요약"}`;
    const userText=`방향: ${direction==='increase'?'강도 올리기(무게 5-10% 증량)':'강도 낮추기(무게 5-10% 감량)'}
운동 목록: ${exes.map((e,i)=>`${e.name}(현재 ${e.weight||'-'}, 피드백:${_sessionFeedback[i]})`).join(', ')}`;
    const text=await callClaude({system,userText,maxTokens:800});
    const result=tryJSON(text);
    if(result?.adjustments){
      result.adjustments.forEach(adj=>{
        const exIdx=exes.findIndex(e=>e.name===adj.name);
        if(exIdx>=0){
          if(adj.newWeight)plan.weeks[0].days.find(d=>d.dayOfWeek===dn).exercises[exIdx].weight=adj.newWeight;
          if(adj.newReps)plan.weeks[0].days.find(d=>d.dayOfWeek===dn).exercises[exIdx].reps=adj.newReps;
        }
      });
      STATE.plan=plan;save();
      toast('✅ 플랜 조정 완료!','ok');
    }
  }catch(e){toast('조정 실패: '+e.message,'err');}
  closeFbModal();
}

      if(dp&&dp.exercises){
        dp.exercises.forEach(function(ex,i){
          if(log[i]&&log[i].sets&&log[i].sets.some(function(s){return s.done;})){
            for(var g in mkw){
              if(mkw[g].some(function(kw){return ex.name.indexOf(kw)>=0;})){
                if(parts.indexOf(g)<0) parts.push(g);
                break;
              }
            }
          }
        });
      }
      workoutMap[key]={done:true,parts:parts};
    }
  }

  // 달력 셀
  var cells='';
  for(var i=0;i<startOffset;i++) cells+='<div class="cal-day empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var key=_calYear+'-'+String(_calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var wk=workoutMap[key];
    var isToday=key===today_d;
    var dots='';
    if(wk&&wk.parts){
      wk.parts.slice(0,3).forEach(function(p){
        dots+='<div class="cal-dot" style="background:'+(muscleColors[p]||'var(--grn)')+'"></div>';
      });
    }
    cells+='<div class="cal-day '+(isToday?'today':'')+' '+(wk?'has-workout':'')+'" onclick="showCalDay(\''+key+'\')">'+
      '<div class="cal-dn" style="color:'+(isToday?'var(--or)':'var(--t2)')+'">'+d+'</div>'+
      (wk?'<div class="cal-dots">'+dots+'</div>':'')+
    '</div>';
  }

  var legend='';
  for(var g in muscleColors){
    legend+='<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+muscleColors[g]+';"></div>'+g+'</div>';
  }

  el.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'+
      '<button class="btn sm" onclick="_calMonth--;if(_calMonth<0){_calMonth=11;_calYear--;}renderCal()">◀</button>'+
      '<div style="font-size:16px;font-weight:900;">'+monthName+'</div>'+
      '<button class="btn sm" onclick="_calMonth++;if(_calMonth>11){_calMonth=0;_calYear++;}renderCal()">▶</button>'+
    '</div>'+
    '<div class="cal-grid">'+['월','화','수','목','금','토','일'].map(function(d){return '<div class="cal-hdr">'+d+'</div>';}).join('')+'</div>'+
    '<div class="cal-grid">'+cells+'</div>'+
    '<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;">'+legend+'</div>'+
    '<div id="cal-detail" style="margin-top:14px;"></div>';
}

function showCalDay(key){
  var log=STATE.logs[key]||{};
  var plan=STATE.plan;
  var dow=new Date(key+'T00:00:00').getDay();
  var dp=plan&&plan.weeks&&plan.weeks[0]&&plan.weeks[0].days&&plan.weeks[0].days.find(function(x){return x.dayOfWeek===DAY7[dow];});
  var detail=document.getElementById('cal-detail');
  if(!detail)return;
  var hasDone=Object.values(log).some(function(v){return v.sets&&v.sets.some(function(s){return s.done;});});
  if(!hasDone){
    detail.innerHTML='<div class="card"><div style="font-size:12px;color:var(--t2);text-align:center;padding:12px;">운동 기록 없음</div></div>';
    return;
  }
  var rows='';
  if(dp&&dp.exercises){
    dp.exercises.forEach(function(ex,i){
      var l=log[i];
      var done=l&&l.sets&&l.sets.some(function(s){return s.done;});
      if(!done)return;
      var totalVol=l.sets.filter(function(s){return s.done;}).reduce(function(s,x){return s+(x.reps||0)*(x.weight||0);},0);
      var fb=l.feedback==='easy'?'😊 쉬움':l.feedback==='hard'?'😓 힘듦':'😐 보통';
      rows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);">'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;">'+(l.activeExName||ex.name)+'</div>'+
          '<div style="font-size:10px;color:var(--t2);font-family:var(--mono);">'+l.sets.filter(function(s){return s.done;}).length+'세트 완료</div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          '<div style="font-family:var(--display);font-size:18px;color:var(--or);">'+Math.round(totalVol)+'<span style="font-size:10px;">kg</span></div>'+
          '<div style="font-size:9px;color:var(--t3);">'+fb+'</div>'+
        '</div>'+
      '</div>';
    });
  }
  detail.innerHTML='<div class="card"><div class="ct"><span>📋</span>'+key+' 운동 기록</div>'+rows+'</div>';
}

async function handleIbOCR(input){
  var file=input.files[0]; if(!file)return;
  var zone=document.getElementById('ib-zone');
  zone.innerHTML='<span class="ui">⏳</span><h3>분석 중...</h3><p>잠시 기다려주세요</p>';
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var b64=await optImg(e.target.result);
      var system='당신은 InBody 체성분 분석기 결과지 전문 판독사입니다.\n'+
        '4단계로 분석하세요:\n'+
        '1단계: 레이블 우선 읽기\n'+
        '2단계: 섹션별 구조 파악\n'+
        '  체수분→bodyWater(L), 체지방량→fatMassKg(kg), 체중→weight(kg)\n'+
        '  골격근량→muscleMass(kg), BMI→bmi, 체지방률→fatPct(%)\n'+
        '  기초대사량/BMR→bmr(kcal)\n'+
        '  부위별: 오른팔→rightArm, 왼팔→leftArm, 몸통→torso, 오른다리→rightLeg, 왼다리→leftLeg (kg)\n'+
        '3단계: 단위 교차검증 (fatPct:3~60%, muscleMass:10~60kg, bmi:10~50)\n'+
        '4단계: 논리검증 (fatPct≈fatMassKg/weight×100)\n'+
        'JSON만 출력: {"weight":0,"fatPct":0,"muscleMass":0,"fatMassKg":0,"bmi":0,"bmr":0,"bodyWater":0,"rightArm":0,"leftArm":0,"torso":0,"rightLeg":0,"leftLeg":0}';
      var text=await callClaude({system:system,userText:'이 InBody 결과지를 4단계로 분석하여 JSON만 출력하세요.',imageBase64:b64,maxTokens:800});
      var result=tryJSON(text);
      if(!result)throw new Error('파싱 실패');
      showIbProof(result);
      zone.innerHTML='<span class="ui">✅</span><h3>추출 완료</h3><p>아래에서 값 확인 후 저장해주세요</p><input type="file" id="ib-file" accept="image/*" style="display:none" onchange="handleIbOCR(this)">';
    }catch(e){
      toast('인바디 분석 실패: '+e.message,'err');
      zone.innerHTML='<span class="ui">📋</span><h3>다시 시도</h3><p>'+e.message+'</p><input type="file" id="ib-file" accept="image/*" style="display:none" onchange="handleIbOCR(this)">';
    }
  };
  reader.readAsDataURL(file);
}

function showIbProof(data){
  var sec=document.getElementById('ib-proof');
  if(!sec)return; sec.style.display='block';
  var fields=[
    {key:'weight',label:'체중',unit:'kg',min:30,max:200},
    {key:'fatPct',label:'체지방률',unit:'%',min:3,max:60},
    {key:'muscleMass',label:'골격근량',unit:'kg',min:10,max:60},
    {key:'fatMassKg',label:'체지방량',unit:'kg',min:2,max:60},
    {key:'bmi',label:'BMI',unit:'',min:10,max:50},
    {key:'bmr',label:'기초대사량',unit:'kcal',min:800,max:3000},
    {key:'bodyWater',label:'체수분',unit:'L',min:20,max:60},
    {key:'rightArm',label:'오른팔',unit:'kg',min:1,max:8},
    {key:'leftArm',label:'왼팔',unit:'kg',min:1,max:8},
    {key:'torso',label:'몸통',unit:'kg',min:15,max:40},
    {key:'rightLeg',label:'오른다리',unit:'kg',min:5,max:20},
    {key:'leftLeg',label:'왼다리',unit:'kg',min:5,max:20},
  ];
  function validate(key,val){
    var f=fields.find(function(x){return x.key===key;});
    if(!f||!val)return'neutral';
    if(val<f.min||val>f.max)return'warn';
    if(key==='fatPct'&&data.fatMassKg&&data.weight){
      var c=data.fatMassKg/data.weight*100;
      if(Math.abs(c-val)>5)return'warn';
    }
    return'ok';
  }
  var rows=fields.map(function(f){
    var val=data[f.key]||0;
    var st=validate(f.key,val);
    var icon=st==='warn'?'⚠️':st==='ok'?'✅':'○';
    return '<div class="pr-row">'+
      '<div class="pr-l">'+f.label+(f.unit?' ('+f.unit+')':'')+'</div>'+
      '<input type="number" class="pr-i '+(st==='warn'?'warn':st==='ok'?'ok':'')+'" id="pr-'+f.key+'" value="'+val+'" step="0.1" oninput="updatePrStatus(\''+f.key+'\',this.value)">'+
      '<div style="font-size:14px;text-align:center;" id="pr-st-'+f.key+'">'+icon+'</div>'+
    '</div>';
  }).join('');
  sec.innerHTML='<div class="card" style="border-color:rgba(255,92,43,.3);">'+
    '<div class="ct"><span>🔍</span>Proof Reading — 값 확인 후 저장</div>'+
    '<div class="bn info" style="margin-bottom:10px;"><span class="bni">💡</span><div>⚠️ 표시된 항목은 이상값입니다. 직접 수정 가능해요.</div></div>'+
    rows+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">'+
      '<button class="btn ghost" style="margin:0;" onclick="document.getElementById(\'ib-proof\').style.display=\'none\'">취소</button>'+
      '<button class="btn" onclick="saveIbData()">✅ 저장하기</button>'+
    '</div>'+
  '</div>';
}

function updatePrStatus(key,val){
  var mm={weight:[30,200],fatPct:[3,60],muscleMass:[10,60],fatMassKg:[2,60],bmi:[10,50],bmr:[800,3000],bodyWater:[20,60],rightArm:[1,8],leftArm:[1,8],torso:[15,40],rightLeg:[5,20],leftLeg:[5,20]};
  var range=mm[key]||[0,9999];
  var el=document.getElementById('pr-'+key), st=document.getElementById('pr-st-'+key);
  var v=parseFloat(val)||0;
  if(v&&(v<range[0]||v>range[1])){el.classList.add('warn');el.classList.remove('ok');if(st)st.textContent='⚠️';}
  else if(v){el.classList.remove('warn');el.classList.add('ok');if(st)st.textContent='✅';}
}

function saveIbData(){
  var keys=['weight','fatPct','muscleMass','fatMassKg','bmi','bmr','bodyWater','rightArm','leftArm','torso','rightLeg','leftLeg'];
  var data={date:today(),source:'inbody'};
  keys.forEach(function(k){var el=document.getElementById('pr-'+k);if(el)data[k]=parseFloat(el.value)||0;});
  if(!data.weight||!data.fatPct){toast('체중과 체지방률은 필수입니다','warn');return;}
  if(!STATE.inbodyHistory)STATE.inbodyHistory=[];
  var idx=STATE.inbodyHistory.findIndex(function(h){return h.date===today();});
  if(idx>=0)STATE.inbodyHistory[idx]=data; else STATE.inbodyHistory.push(data);
  save();
  toast('✅ 인바디 데이터 저장 완료!','ok');
  document.getElementById('ib-proof').style.display='none';
  renderInbody();
}

function switchIbChart(key){
  var history=STATE.inbodyHistory||[];
  if(history.length<2)return;
  document.querySelectorAll('[id^="ibt-"]').forEach(function(b){b.classList.remove('on');});
  var cb=document.getElementById('ibt-'+key); if(cb)cb.classList.add('on');
  var labels={weight:'체중(kg)',fatPct:'체지방률(%)',muscleMass:'골격근량(kg)',bmi:'BMI',fatMassKg:'체지방량(kg)'};
  var targets=STATE.planTargets;
  var vals=history.map(function(h){return parseFloat(h[key])||0;});
  var minV=Math.min.apply(null,vals)*.97, maxV=Math.max.apply(null,vals)*1.03;
  var range=maxV-minV||1;
  var W=280,H=110,P=8;
  function xp(i){return P+(i/(history.length-1||1))*(W-P*2)+P;}
  function yp(v){return H-P-(v-minV)/range*(H-P*2);}
  var tgt=targets&&targets[key];
  var tgtHtml=tgt?
    '<rect x="'+P+'" y="'+(yp(tgt)-8)+'" width="'+W+'" height="16" fill="rgba(57,224,122,.06)" rx="3"/>'+
    '<line x1="'+P+'" y1="'+yp(tgt)+'" x2="'+(W+P)+'" y2="'+yp(tgt)+'" stroke="var(--grn)" stroke-width="1" stroke-dasharray="4,3"/>'+
    '<text x="'+(W+P-2)+'" y="'+(yp(tgt)-3)+'" fill="var(--grn)" font-size="8" text-anchor="end">목표'+tgt+'</text>':'';
  var pts=history.map(function(h,i){return xp(i)+','+yp(parseFloat(h[key])||0);}).join(' ');
  var area='M'+xp(0)+','+H+' '+history.map(function(h,i){return 'L'+xp(i)+','+yp(parseFloat(h[key])||0);}).join(' ')+' L'+xp(history.length-1)+','+H+' Z';
  var dots=history.map(function(h,i){
    var vv=parseFloat(h[key])||0;
    return '<circle cx="'+xp(i)+'" cy="'+yp(vv)+'" r="4" fill="var(--or)" stroke="var(--bg)" stroke-width="2"/>'+
      '<text x="'+xp(i)+'" y="'+(yp(vv)-8)+'" fill="var(--t2)" font-size="8" text-anchor="middle">'+vv+'</text>'+
      '<text x="'+xp(i)+'" y="'+(H+P-1)+'" fill="var(--t3)" font-size="7" text-anchor="middle">'+h.date.slice(5)+'</text>';
  }).join('');
  var svgStr='<svg viewBox="0 0 '+(W+P*2)+' '+(H+P)+'" style="width:100%;min-width:260px;" xmlns="http://www.w3.org/2000/svg">'+
    '<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#ff5c2b" stop-opacity=".3"/>'+
      '<stop offset="100%" stop-color="#ff5c2b" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    tgtHtml+
    '<path d="'+area+'" fill="url(#ag)"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="var(--or)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
    dots+
  '</svg>';
  var el=document.getElementById('ib-chart-svg');
  if(el)el.innerHTML='<div style="font-size:10px;color:var(--t2);margin-bottom:4px;font-family:var(--mono);">'+(labels[key]||key)+'</div>'+svgStr;
}

function updateTarget(key,val){if(!STATE.planTargets)STATE.planTargets={};STATE.planTargets[key]=parseFloat(val)||0;save();}

async function suggestTargets(){
  var latest=STATE.inbodyHistory&&STATE.inbodyHistory.length?STATE.inbodyHistory[STATE.inbodyHistory.length-1]:null;
  if(!latest){toast('인바디 데이터를 먼저 입력해주세요','warn');return;}
  var card=document.getElementById('ib-targets');
  if(card)card.innerHTML='<div class="ail"><div class="air"></div><p>AI가 목표값을 분석 중...</p></div>';
  var p=STATE.profile||{};
  var goalMap={muscle:'근육증가',diet:'체지방감소',endurance:'체력향상',health:'건강유지'};
  var goalStr=(STATE.goals||[]).map(function(g){return goalMap[g]||g;}).join(',');
  var system='체성분 전문가로서 3개월 목표값을 JSON으로만 제안: {"fatPct":0,"muscleMass":0,"weight":0,"bmi":0,"reason":"이유 2~3문장"}';
  var userText='현재: 체중'+latest.weight+'kg/체지방률'+latest.fatPct+'%/골격근량'+latest.muscleMass+'kg/BMI'+latest.bmi+'\n나이'+p.age+'/성별'+p.gender+'/목표:'+goalStr;
  try{
    var text=await callClaude({system:system,userText:userText,maxTokens:400});
    var result=tryJSON(text);
    if(!result||!result.fatPct)throw new Error('파싱 실패');
    if(card){
      var fields=[['체지방률','fatPct','%'],['골격근량','muscleMass','kg'],['체중','weight','kg'],['BMI','bmi','']];
      var rows=fields.map(function(f){
        var cur=latest?latest[f[1]]:'–';
        return '<div style="display:grid;grid-template-columns:1fr 80px 24px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);">'+
          '<span style="font-size:12px;color:var(--t2);">'+f[0]+' <span style="color:var(--t3)">(현재 '+cur+f[2]+')</span></span>'+
          '<input type="number" style="background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:6px 8px;border-radius:8px;font-family:var(--mono);font-size:12px;text-align:center;width:100%;" id="sug-'+f[1]+'" value="'+(result[f[1]]||'')+'" step="0.1">'+
          '<span style="font-size:10px;color:var(--t3);font-family:var(--mono);">'+f[2]+'</span>'+
        '</div>';
      }).join('');
      card.innerHTML='<div class="ct"><span>🤖</span>AI 목표값 제안</div>'+
        '<div style="background:var(--orD);border:1px solid rgba(255,92,43,.2);border-radius:10px;padding:12px;margin-bottom:12px;">'+
          '<div style="font-size:10px;font-weight:700;color:var(--or);margin-bottom:6px;font-family:var(--mono);">📌 왜 이 목표인가요?</div>'+
          '<div style="font-size:12px;line-height:1.7;">'+(result.reason||'현재 체성분 기반 3개월 달성 가능 목표')+'</div>'+
        '</div>'+
        rows+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">'+
          '<button class="btn ghost" style="margin:0;" onclick="suggestTargets()">🔄 재제안</button>'+
          '<button class="btn" onclick="confirmTargets()">✅ 확정!</button>'+
        '</div>';
    }
  }catch(e){toast('목표값 생성 실패: '+e.message,'err');renderInbody();}
}

function confirmTargets(){
  if(!STATE.planTargets)STATE.planTargets={};
  ['fatPct','muscleMass','weight','bmi'].forEach(function(k){
    var el=document.getElementById('sug-'+k); if(el)STATE.planTargets[k]=parseFloat(el.value)||0;
  });
  save();toast('✅ 목표값 확정!','ok');renderInbody();
}

// ════════════════════════════════════════
// 설정 탭
// ════════════════════════════════════════
function renderSettings(){
  const el=document.getElementById('v-settings');
  const p=STATE.profile||{};
  const cond=STATE.conditionLog?.[today()]||0;
  const days=['월','화','수','목','금','토','일'];
  const injuries=[['shoulder','어깨'],['knee','무릎'],['back','허리'],['wrist','손목'],['elbow','팔꿈치'],['hip','고관절']];

  const dayBtns=days.map((d,i)=>{
    const on=(STATE.preferredDays||[]).includes(i)?'on':'';
    return '<button class="db '+on+'" onclick="togglePsDay('+i+',this)">'+d+'</button>';
  }).join('');

  const injBtns=injuries.map(function(item){
    const k=item[0],l=item[1];
    const on=(STATE.injuryZones||[]).includes(k)?'on red':'';
    return '<button class="btn sm '+on+'" onclick="togglePsInjury(\''+k+'\',this)">'+l+'</button>';
  }).join('');

  const freqOpts=[1,2,3,4,5,6].map(n=>'<option value="'+n+'" '+(((p.weeklyFreq||4)==n)?'selected':'')+'">'+n+'회</option>').join('');

  el.innerHTML=
    '<div style="font-size:20px;font-weight:900;margin-bottom:16px;">⚙️ 설정</div>'+

    '<div class="sl">API 설정</div>'+
    '<div class="card">'+
      '<div class="ct"><span>🔑</span>Anthropic API 키</div>'+
      '<div class="bn info"><span class="bni">💡</span><div>console.anthropic.com에서 발급. NutriLens와 동일 키 사용 가능.</div></div>'+
      '<div style="margin-bottom:12px;"><label class="fl">API 키</label>'+
        '<input type="password" class="fi" id="st-apikey" placeholder="sk-ant-..." value="'+getKey()+'">'+
      '</div>'+
      '<button class="btn" onclick="const k=document.getElementById(\'st-apikey\').value.trim();if(k){setKey(k);toast(\'API 키 저장 완료!\',\'ok\');}">저장</button>'+
    '</div>'+

    '<div class="sl">프로필</div>'+
    '<div class="card">'+
      '<div class="ct"><span>👤</span>기본 정보</div>'+
      '<div class="fg2">'+
        '<div style="margin-bottom:10px;"><label class="fl">나이</label><input type="number" class="fi" id="st-age" value="'+(p.age||'')+'"></div>'+
        '<div style="margin-bottom:10px;"><label class="fl">성별</label><select class="fs" id="st-gender">'+
          '<option value="male" '+(p.gender==='male'?'selected':'')+'>남성</option>'+
          '<option value="female" '+(p.gender==='female'?'selected':'')+'>여성</option>'+
        '</select></div>'+
        '<div style="margin-bottom:10px;"><label class="fl">키 (cm)</label><input type="number" class="fi" id="st-height" value="'+(p.height||'')+'"></div>'+
        '<div style="margin-bottom:10px;"><label class="fl">몸무게 (kg)</label><input type="number" class="fi" id="st-weight" value="'+(p.weight||'')+'"></div>'+
      '</div>'+
      '<div style="margin-bottom:10px;"><label class="fl">주당 운동 횟수</label>'+
        '<select class="fs" id="st-freq">'+freqOpts+'</select>'+
      '</div>'+
      '<div style="margin-bottom:12px;"><label class="fl">운동 경력</label>'+
        '<select class="fs" id="st-level">'+
          '<option value="beginner" '+(p.level==='beginner'?'selected':'')+'>초보 (1년 미만)</option>'+
          '<option value="intermediate" '+(p.level==='intermediate'?'selected':'')+'>중급 (1~3년)</option>'+
          '<option value="advanced" '+(p.level==='advanced'?'selected':'')+'>고급 (3년 이상)</option>'+
        '</select>'+
      '</div>'+
      '<button class="btn" onclick="saveProfile()">저장</button>'+
    '</div>'+

    '<div class="sl">운동 설정</div>'+
    '<div class="card">'+
      '<div class="ct"><span>📅</span>운동 요일</div>'+
      '<div class="dg" style="margin-bottom:8px;">'+dayBtns+'</div>'+
      '<div class="ct" style="margin-top:12px;"><span>🚨</span>주의 부위</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px;">'+injBtns+'</div>'+
    '</div>'+

    '<div class="sl">오늘 컨디션</div>'+
    '<div class="card">'+
      '<div class="sr"><span class="sk">현재 컨디션</span><span class="sv">'+(cond?'●'.repeat(cond)+'○'.repeat(5-cond):'미설정')+'</span></div>'+
      '<div class="sr"><span class="sk">운동 강도</span><span class="sv" style="color:var(--or);">'+Math.round(getCondScale()*100)+'%</span></div>'+
      '<button class="btn ghost" onclick="delete STATE.conditionLog[today()];save();checkCond();">컨디션 재설정</button>'+
    '</div>'+

    '<div class="sl">데이터 관리</div>'+
    '<div class="card">'+
      '<button class="btn ghost" style="margin-bottom:8px;" onclick="resetLogs()">🗑 운동 기록 초기화</button>'+
      '<button class="btn ghost" style="margin-bottom:8px;border-color:var(--red);color:var(--red);" onclick="resetAll()">⚠️ 전체 초기화</button>'+
    '</div>';
}

function saveProfile(){
  const age=+document.getElementById('st-age').value;
  const height=+document.getElementById('st-height').value;
  const weight=+document.getElementById('st-weight').value;
  if(!age||!height||!weight){toast('나이, 키, 몸무게를 모두 입력해주세요','warn');return;}
  STATE.profile={...(STATE.profile||{}),age,height,weight,
    gender:document.getElementById('st-gender').value,
    weeklyFreq:+document.getElementById('st-freq').value,
    level:document.getElementById('st-level').value};
  save();toast('프로필 저장 완료!','ok');
}
function resetLogs(){if(confirm('운동 기록을 초기화할까요?')){STATE.logs={};STATE.conditionLog={};STATE.postponed={};save();toast('운동 기록 초기화 완료','ok');}}
function resetAll(){if(confirm('정말 모든 데이터를 초기화할까요?')){localStorage.removeItem(SK);location.reload();}}

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  if(STATE.onboardingDone){
    document.getElementById('ob').style.display='none';
    document.getElementById('app').style.display='flex';
    checkCond();
    renderHome();
  } else {
    renderOb();
  }
});
</script>
