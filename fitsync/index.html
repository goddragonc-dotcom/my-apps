<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitSync">
<meta name="theme-color" content="#0c0c0f">
<title>FitSync — AI 피트니스 코치</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0f; --s1:#131318; --s2:#1a1a22; --s3:#22222d;
  --bd:#2a2a38; --bd2:#363650;
  --or:#ff5c2b; --or2:#ff7a4d; --orD:#ff5c2b22;
  --grn:#39e07a; --grnD:#39e07a18;
  --blu:#3b9eff; --bluD:#3b9eff18;
  --yel:#ffd234; --yelD:#ffd23418;
  --red:#ff4466; --redD:#ff446618;
  --t1:#f0f0f8; --t2:#8888aa; --t3:#44445a;
  --font:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Bebas Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:14px;}

/* ── 노이즈 텍스처 ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}

/* ── 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;z-index:1;}
#header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--bd);}
.logo{font-family:var(--display);font-size:26px;letter-spacing:3px;color:var(--or);}
.logo span{color:var(--t1);}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--t3);font-family:var(--mono);margin-top:-4px;}
.header-badge{background:var(--orD);border:1px solid var(--or);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--or);font-family:var(--mono);}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:20px;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── 바텀 탭 ── */
#tabs{flex-shrink:0;display:grid;grid-template-columns:repeat(7,1fr);background:var(--s1);border-top:1px solid var(--bd);padding:6px 0 max(10px,env(safe-area-inset-bottom));}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;}
.tab-btn .ti{font-size:16px;filter:grayscale(1) opacity(.4);transition:all .2s;}
.tab-btn .tl{font-size:8px;font-weight:700;color:var(--t3);transition:color .2s;font-family:var(--mono);}
.tab-btn.active .ti{filter:none;}
.tab-btn.active .tl{color:var(--or);}

/* ── 뷰 ── */
.view{display:none;padding:16px 18px;animation:fadeUp .25s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── 공통 카드 ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-family:var(--mono);display:flex;align-items:center;gap:6px;}
.card-title span{font-size:13px;}

/* ── 섹션 라벨 ── */
.sec-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;margin:18px 0 10px;padding:0 2px;}

/* ── 버튼 ── */
.btn-primary{width:100%;background:var(--or);color:#fff;border:none;padding:13px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,92,43,.35);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{width:100%;background:none;color:var(--t2);border:1px solid var(--bd);padding:10px;border-radius:12px;font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn-ghost:hover{border-color:var(--bd2);color:var(--t1);}
.btn-sm{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:5px 12px;border-radius:8px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-sm.active,.btn-sm:hover{background:var(--orD);border-color:var(--or);color:var(--or);}
.btn-icon{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px;transition:color .2s;}
.btn-icon:hover{color:var(--t1);}

/* ── 폼 ── */
.form-row{margin-bottom:12px;}
.form-label{font-size:10px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;letter-spacing:.5px;font-family:var(--mono);}
.form-input,.form-select{background:var(--s2);border:1px solid var(--bd);color:var(--t1);padding:10px 12px;border-radius:10px;font-family:var(--font);font-size:13px;width:100%;transition:border-color .2s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(255,92,43,.1);}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ── 진행바 ── */
.prog-wrap{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.prog-row{display:grid;grid-template-columns:60px 1fr 48px;align-items:center;gap:8px;margin-bottom:8px;}
.prog-label{font-size:10px;color:var(--t2);font-family:var(--mono);}
.prog-val{font-size:10px;text-align:right;font-family:var(--mono);}

/* ── 체크박스 운동 ── */
.exercise-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;transition:all .2s;cursor:pointer;}
.exercise-item.done{border-color:var(--grn);background:rgba(57,224,122,.04);}
.exercise-item.done .ex-name{text-decoration:line-through;color:var(--t3);}
.ex-check{width:22px;height:22px;border:2px solid var(--bd2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.exercise-item.done .ex-check{background:var(--grn);border-color:var(--grn);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.ex-detail{font-size:10px;color:var(--t2);font-family:var(--mono);}
.ex-badge{font-size:9px;background:var(--orD);color:var(--or);border:1px solid var(--or);padding:1px 7px;border-radius:100px;font-family:var(--mono);flex-shrink:0;}

/* ── 링 차트 ── */
.ring-wrap{position:relative;width:100px;height:100px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ring-num{font-family:var(--display);font-size:24px;color:var(--or);line-height:1;}
.ring-lbl{font-size:8px;color:var(--t3);font-family:var(--mono);margin-top:1px;}

/* ── 통계 그리드 ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center;}
.stat-num{font-family:var(--display);font-size:28px;line-height:1;margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--t2);font-family:var(--mono);}

/* ── 라인 차트 ── */
.line-chart-wrap{width:100%;overflow:hidden;}

/* ── 알림 배너 ── */
.banner{border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;font-size:12px;line-height:1.6;}
.banner.info{background:var(--bluD);border:1px solid rgba(59,158,255,.25);}
.banner.warn{background:var(--yelD);border:1px solid rgba(255,210,52,.25);}
.banner.success{background:var(--grnD);border:1px solid rgba(57,224,122,.25);}
.banner.danger{background:var(--redD);border:1px solid rgba(255,68,102,.25);}
.banner-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── 업로드 존 ── */
.upload-zone{border:2px dashed var(--bd2);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .3s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--or);background:var(--orD);}
.upload-zone .uz-icon{font-size:40px;margin-bottom:10px;display:block;}
.upload-zone h3{font-size:15px;font-weight:700;margin-bottom:5px;}
.upload-zone p{font-size:11px;color:var(--t2);line-height:1.6;}

/* ── 태그 칩 ── */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;font-family:var(--mono);}
.chip.or{background:var(--orD);color:var(--or);border:1px solid var(--or);}
.chip.grn{background:var(--grnD);color:var(--grn);border:1px solid var(--grn);}
.chip.blu{background:var(--bluD);color:var(--blu);border:1px solid var(--blu);}
.chip.yel{background:var(--yelD);color:var(--yel);border:1px solid var(--yel);}
.chip.red{background:var(--redD);color:var(--red);border:1px solid var(--red);}
.chip.gray{background:var(--s3);color:var(--t2);border:1px solid var(--bd);}

/* ── 스켈레톤 ── */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:10px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 토스트 ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bd2);color:var(--t1);padding:10px 18px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;max-width:320px;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 온보딩 스텝 ── */
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:all .3s;}
.step-dot.active{width:20px;border-radius:3px;background:var(--or);}
.step-dot.done{background:var(--grn);}

/* ── 목표 선택 카드 ── */
.goal-card{background:var(--s2);border:2px solid var(--bd);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;}
.goal-card:hover{border-color:var(--bd2);}
.goal-card.selected{border-color:var(--or);background:var(--orD);}
.goal-card .gc-icon{font-size:28px;margin-bottom:6px;display:block;}
.goal-card .gc-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.goal-card .gc-desc{font-size:10px;color:var(--t2);line-height:1.4;}

/* ── 인바디 결과 ── */
.inbody-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.inbody-item{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;}
.inbody-val{font-family:var(--display);font-size:22px;line-height:1;margin-bottom:2px;}
.inbody-lbl{font-size:9px;color:var(--t2);font-family:var(--mono);}

/* ── 운동 플랜 탭 ── */
.day-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:6px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.day-tab.active{background:var(--orD);border-color:var(--or);color:var(--or);}
.day-tab.rest{opacity:.5;}

/* ── 영양 연동 바 ── */
.nutr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);}
.nutr-row:last-child{border-bottom:none;}
.nutr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nutr-name{font-size:12px;color:var(--t2);width:52px;flex-shrink:0;font-family:var(--mono);}
.nutr-bar-wrap{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.nutr-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.nutr-val{font-size:10px;font-family:var(--mono);text-align:right;width:64px;flex-shrink:0;}

/* ── 프로그레스 히스토리 ── */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
.history-item:last-child{border-bottom:none;}
.history-date{font-size:11px;color:var(--t2);font-family:var(--mono);}
.history-vals{display:flex;gap:12px;}
.history-val{font-size:11px;font-family:var(--mono);}

/* ── AI 로딩 ── */
.ai-loading{text-align:center;padding:32px 20px;}
.ai-ring{width:40px;height:40px;border:3px solid var(--bd2);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-loading p{font-size:12px;color:var(--t2);line-height:1.8;}

/* ── 주간 바 차트 ── */
.week-bars{display:flex;gap:4px;align-items:flex-end;height:60px;margin:10px 0 4px;}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.week-bar-col .wb{border-radius:3px 3px 0 0;min-height:2px;transition:height .5s ease;width:100%;}
.week-bar-col .wd{font-size:9px;color:var(--t3);font-family:var(--mono);}
.week-bar-col.today .wd{color:var(--or);font-weight:700;}

/* ── 섹션 구분선 ── */
.divider{height:1px;background:var(--bd);margin:16px 0;}

/* ── 스크롤 힌트 ── */
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.scroll-x::-webkit-scrollbar{display:none;}

/* ── AI 코멘트 박스 ── */
.ai-box{background:linear-gradient(135deg,rgba(255,92,43,.06),transparent);border:1px solid rgba(255,92,43,.2);border-radius:14px;padding:14px;}
.ai-box-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-box-title{font-size:12px;font-weight:700;color:var(--or);}
.ai-score{font-family:var(--display);font-size:36px;color:var(--or);line-height:1;}

/* ── 설정 섹션 ── */
.setting-section h4{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
.setting-row:last-child{border-bottom:none;}
.setting-key{font-size:12px;color:var(--t2);}
.setting-val{font-size:12px;font-weight:700;color:var(--t1);font-family:var(--mono);}

/* ── 온보딩 전용 ── */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.ob-header{padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between;}
.ob-logo{font-family:var(--display);font-size:28px;letter-spacing:3px;color:var(--or);}
.ob-skip{font-size:12px;color:var(--t3);cursor:pointer;padding:4px;}
.ob-body{flex:1;overflow-y:auto;padding:10px 20px 20px;}
.ob-title{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:6px;}
.ob-subtitle{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.6;}
.ob-footer{padding:12px 20px max(20px,env(safe-area-inset-bottom));}

/* ── v2 추가 스타일 ── */
.header-right{display:flex;align-items:center;gap:8px;}
.nutr-link{display:inline-flex;align-items:center;gap:4px;background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.25);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:#c8f135;text-decoration:none;}
.day-select-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px;}
.day-btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:8px 0;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.day-btn.active{background:var(--orD);border-color:var(--or);color:var(--or);}
.plan-day-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.plan-day-tabs::-webkit-scrollbar{display:none;}
.plan-day-tab{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:6px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.plan-day-tab.active{background:var(--orD);border-color:var(--or);color:var(--or);}
.plan-day-tab.rest{opacity:.5;}
/* 컨디션 모달 */
.condition-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.condition-box{background:var(--s1);border:1px solid var(--bd2);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center;}
.condition-emojis{display:flex;justify-content:center;gap:12px;margin:20px 0;}
.cond-btn{font-size:28px;background:none;border:2px solid transparent;border-radius:12px;padding:8px;cursor:pointer;transition:all .2s;}
.cond-btn.selected{border-color:var(--or);background:var(--orD);}
/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--s1);border:1px solid var(--bd2);border-radius:20px 20px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:900;margin-bottom:16px;}
/* 실행탭 */
.exec-header{background:linear-gradient(135deg,rgba(255,92,43,.1),transparent);border:1px solid rgba(255,92,43,.2);border-radius:16px;padding:16px;margin-bottom:14px;}
.exec-progress-dots{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.exec-dot{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:all .3s;}
.exec-dot.done{background:var(--grn);}
.exec-dot.current{background:var(--or);width:20px;border-radius:4px;}
.exec-set-row{display:grid;grid-template-columns:34px 1fr 1fr 52px;gap:6px;align-items:center;margin-bottom:8px;}
.set-num{font-family:var(--display);font-size:18px;color:var(--t3);text-align:center;}
.set-num.active{color:var(--or);}
.set-num.done{color:var(--grn);}

const SK = 'fitsync_v1';
const AK = 'fitsync_apikey';

const LS = {
  load: () => { try { const s = localStorage.getItem(SK); return s ? JSON.parse(s) : null; } catch { return null; } },
  save: (d) => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} },
};

const SEED = {
  profile: null, goals: [], preferredDays: [], injuryZones: [],
  plan: null, planTargets: null,
  logs: {}, workoutLogs: [], inbodyHistory: [],
  conditionLog: {}, postponed: {},
  apiKey: '', onboardingDone: false,
};

let STATE = LS.load() || { ...SEED };

function save() { LS.save(STATE); }
function getApiKey() { return localStorage.getItem(AK) || STATE.apiKey || ''; }
function setApiKey(k) { localStorage.setItem(AK, k); STATE.apiKey = k; save(); }

// ════════════════════════════════════════════════════════

const today = () => new Date().toISOString().slice(0, 10);
const fmt = (n, d = 0) => Number(n).toLocaleString('ko-KR', { maximumFractionDigits: d });

const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];

let _toastTimer = null;
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const colors = { info: '#3b9eff', success: '#39e07a', warn: '#ffd234', error: '#ff4466' };
  t.textContent = msg;
  t.style.borderColor = colors[type] || colors.info;
  t.style.color = colors[type] || colors.info;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function tryJSON(str) {
  if (!str) return null;
  let s = str.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(s); } catch {}
  const i = s.indexOf('{'), j = s.lastIndexOf('}');
  if (i !== -1 && j > i) try { return JSON.parse(s.slice(i, j + 1)); } catch {}
  return null;
}

// ════════════════════════════════════════════════════════
// Claude API
// ════════════════════════════════════════════════════════
async function callClaude({ system, userText, imageBase64, imageMime, maxTokens = 1500 }) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API 키를 설정 탭에서 입력해주세요');

  const userContent = [];
  if (imageBase64) userContent.push({ type: 'image', source: { type: 'base64', media_type: imageMime || 'image/jpeg', data: imageBase64 } });
  userContent.push({ type: 'text', text: userText });

  const resp = await fetch('/api/claude-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      system: [{ type: 'text', text: system, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: userContent }],
    }),
  });
  const data = await resp.json();
  if (!resp.ok || data.error) throw new Error(data.error?.message || `API 오류 ${resp.status}`);
  return data.content?.find(c => c.type === 'text')?.text || '';
}

// 이미지 최적화
function optimizeImage(dataUrl) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const r = Math.min(700 / img.width, 1);
      const c = document.createElement('canvas');
      c.width = img.width * r; c.height = img.height * r;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.7).split(',')[1]);
    };
    img.src = dataUrl;
  });
}

function toggleGoal(key, el) {
  if (!STATE.goals) STATE.goals = [];
  const i = STATE.goals.indexOf(key);
  if (i >= 0) { STATE.goals.splice(i, 1); el.classList.remove('selected'); }
  else { STATE.goals.push(key); el.classList.add('selected'); }
}

function toggleDayOb(idx, el) {
  if (!STATE.preferredDays) STATE.preferredDays = [];
  const freq = STATE.profile?.weeklyFreq||4;
  const i = STATE.preferredDays.indexOf(idx);
  if (i>=0) { STATE.preferredDays.splice(i,1); el.classList.remove('active'); }
  else if (STATE.preferredDays.length<freq) { STATE.preferredDays.push(idx); el.classList.add('active'); }
  else { toast(`최대 ${freq}개까지 선택 가능해요`,'warn'); return; }
  const msg = document.getElementById('ob-day-count');
  if (msg) msg.textContent = `${STATE.preferredDays.length}/${freq}개 선택됨`;
}
function toggleInjuryOb(key, el) {
  if (!STATE.injuryZones) STATE.injuryZones = [];
  const i = STATE.injuryZones.indexOf(key);
  if (i>=0) { STATE.injuryZones.splice(i,1); el.classList.remove('active'); }
  else { STATE.injuryZones.push(key); el.classList.add('active'); }
}

async function handleInbodyUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const zone = document.getElementById('ob-inbody-zone');
  zone.innerHTML = '<span class="uz-icon">⏳</span><h3>분석 중...</h3>';

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const b64 = await optimizeImage(e.target.result);
      const text = await callClaude({
        system: `당신은 InBody 체성분 분석기 결과지 전문 판독사입니다.
이미지를 분석할 때 반드시 아래 4단계 방법을 순서대로 적용하세요.

━━━ 1단계: 레이블 우선 읽기 ━━━
각 숫자를 읽기 전에 반드시 해당 행의 레이블 텍스트를 먼저 확인하세요.
InBody 결과지는 항상 "레이블 → 숫자" 순서로 구성됩니다.
레이블 없이 숫자만 보고 판단하지 마세요.

━━━ 2단계: InBody 섹션별 구조 파악 ━━━

[체성분분석 / Body Composition Analysis 섹션]
레이블로 식별:
  "체수분" 또는 "Total Body Water" → bodyWater (단위: L)
  "단백질" 또는 "Protein" → 별도 저장 불필요
  "무기질" 또는 "Minerals" → 별도 저장 불필요
  "체지방" 또는 "Body Fat Mass" → fatMassKg (단위: kg, 체지방의 무게)
  "체중" 또는 "Weight" (맨 오른쪽 열) → weight (단위: kg)

[골격근·지방분석 / Muscle-Fat Analysis 섹션]
레이블로 식별 (가로 바 차트):
  "체중" 또는 "Weight" → weight 재확인
  "골격근량" 또는 "Skeletal Muscle Mass" → muscleMass (단위: kg)
  "체지방량" 또는 "Body Fat Mass" → fatMassKg 재확인

[비만분석 / Obesity Analysis 섹션]
레이블로 식별 (가로 바 차트):
  "BMI" 또는 "Body Mass Index" (kg/m² 단위) → bmi (소수점 1자리, 단위 없음)
  "체지방률" 또는 "Percent Body Fat" (% 단위) → fatPct (소수점 1자리, % 단위)

[부위별근육분석 / Segmental Lean Analysis 섹션]
레이블로 식별:
  "오른팔" 또는 "Right Arm" → rightArm (단위: kg)
  "왼팔" 또는 "Left Arm" → leftArm (단위: kg)
  "몸통" 또는 "Trunk" → torso (단위: kg)
  "오른다리" 또는 "Right Leg" → rightLeg (단위: kg)
  "왼다리" 또는 "Left Leg" → leftLeg (단위: kg)

[기타]
  "기초대사량" 또는 "BMR" → bmr (단위: kcal)
  "내장지방" 또는 "VFA" → visceralFat (레벨 또는 cm²)

━━━ 3단계: 단위로 교차검증 ━━━
추출 후 각 값의 단위가 맞는지 확인:
  fatPct (체지방률): 반드시 % 단위 → 값 범위 3~60 사이
  muscleMass (골격근량): 반드시 kg 단위 → 값 범위 10~60 사이
  fatMassKg (체지방량): 반드시 kg 단위 → 값 범위 2~60 사이
  bmi: 단위 없음 (kg/m²) → 값 범위 10~50 사이
  weight: 반드시 kg 단위 → 값 범위 30~200 사이
  bmr: 반드시 kcal 단위 → 값 범위 800~3000 사이

━━━ 4단계: 논리적 일관성 검증 ━━━
아래 관계가 성립하는지 확인하세요:
  ✓ 체중(weight) = 체수분 + 단백질 + 무기질 + 체지방량 (대략적으로)
  ✓ fatPct(%) = fatMassKg / weight × 100 (대략적으로 일치해야 함)
    예: 체중 65kg, 체지방량 10.5kg → 체지방률 ≈ 16.1%
    만약 계산값과 추출값이 크게 다르면 둘 중 하나가 잘못된 것
  ✓ muscleMass < weight (골격근량은 항상 체중보다 작음)
  ✓ rightArm ≈ leftArm (좌우 차이 보통 0.5kg 이내)
  ✓ torso > rightLeg > rightArm (몸통 > 다리 > 팔 순서)

━━━ 혼동하기 쉬운 항목 ━━━
다음 항목들은 이름이 비슷하지만 완전히 다릅니다:
  체지방량 (fatMassKg, kg 단위) ≠ 체지방률 (fatPct, % 단위)
  골격근량 (muscleMass, kg 단위) ≠ 체지방량 (fatMassKg, kg 단위)
  BMI (bmi, 무단위) ≠ 체지방률 (fatPct, % 단위)
레이블을 확인하지 않고 숫자만 보면 이 셋을 혼동할 수 있습니다.
반드시 해당 행의 레이블 텍스트를 먼저 읽으세요.

━━━ 출력 형식 ━━━
JSON만 출력 (마크다운, 설명, 백틱 절대 없음):
{"weight":0,"fatPct":0,"muscleMass":0,"fatMassKg":0,"bmi":0,"bmr":0,"visceralFat":0,"bodyWater":0,"rightArm":0,"leftArm":0,"torso":0,"rightLeg":0,"leftLeg":0}`,
        userText: '이 InBody 결과지를 4개 섹션 구조에 따라 정확히 분석하여 JSON만 출력하세요.',
        imageBase64: b64, maxTokens: 800,
      });
      const result = tryJSON(text);
      if (result) {
        STATE._tempInbody = result;
        const el = document.getElementById('ob-inbody-result');
        el.style.display = 'block';
        el.innerHTML = `
          <div class="banner success"><span class="banner-icon">✅</span><div>인바디 데이터 추출 완료!</div></div>
          <div class="inbody-grid">
            ${[['체중', result.weight, 'kg'], ['체지방률', result.fatPct, '%'], ['골격근량', result.muscleMass, 'kg'],
               ['체지방량', result.fatMassKg, 'kg'], ['BMI', result.bmi, ''], ['기초대사량', result.bmr, 'kcal'], ['내장지방', result.visceralFat, '레벨']].map(([l, v, u]) =>
               `<div class="inbody-item"><div class="inbody-val" style="color:var(--or)">${v || '–'}</div><div class="inbody-lbl">${l}${u ? ' ('+u+')' : ''}</div></div>`).join('')}
          </div>`;
        if (result.fatPct) document.getElementById('ob-fat-pct').value = result.fatPct;
        if (result.muscleMass) document.getElementById('ob-muscle').value = result.muscleMass;
        if (result.bmi) document.getElementById('ob-bmi').value = result.bmi;
        zone.innerHTML = `<span class="uz-icon">✅</span><h3>분석 완료</h3><p>다른 사진으로 다시 시도하려면 클릭</p><input type="file" id="ob-inbody-file" accept="image/*" style="display:none" onchange="handleInbodyUpload(this)">`;
      }
    } catch (e) {
      toast('인바디 분석 실패: ' + e.message, 'error');
      zone.innerHTML = `<span class="uz-icon">📋</span><h3>다시 시도</h3><p>${e.message}</p><input type="file" id="ob-inbody-file" accept="image/*" style="display:none" onchange="handleInbodyUpload(this)">`;
    }
  };
  reader.readAsDataURL(file);
}

function obNext() {
  // 단계별 저장
  if (OB_STEPS[obStep].id === 'profile') {
    const age = +document.getElementById('ob-age').value;
    const height = +document.getElementById('ob-height').value;
    const weight = +document.getElementById('ob-weight').value;
    if (!age || !height || !weight) { toast('나이, 키, 몸무게를 입력해주세요', 'warn'); return; }
    STATE.profile = {
      age, height, weight,
      gender: document.getElementById('ob-gender').value,
      weeklyFreq: +document.getElementById('ob-freq').value,
      level: document.getElementById('ob-level').value,
      durationMonths: 3,
    };
  }
  if (OB_STEPS[obStep].id === 'goals') {
    if (!STATE.goals?.length) { toast('목표를 하나 이상 선택해주세요', 'warn'); return; }
    if (STATE.profile) STATE.profile.durationMonths = +document.getElementById('ob-duration').value;
  }
  if (OB_STEPS[obStep].id === 'inbody') {
    const fatPct = parseFloat(document.getElementById('ob-fat-pct').value);
    const muscle = parseFloat(document.getElementById('ob-muscle').value);
    const bmi = parseFloat(document.getElementById('ob-bmi').value);
    if (fatPct || muscle) {
      const inbodyEntry = {
        date: today(), weight: STATE.profile?.weight || 0,
        fatPct: fatPct || 0, muscleMass: muscle || 0, bmi: bmi || 0,
        ...(STATE._tempInbody || {}),
      };
      STATE.inbodyHistory = [inbodyEntry];
      delete STATE._tempInbody;
    }
  }
  if (OB_STEPS[obStep].id === 'apikey') {
    const k = document.getElementById('ob-apikey').value.trim();
    if (k) setApiKey(k);
    // 마지막 단계
    STATE.onboardingDone = true;
    save();
    finishOnboarding();
    return;
  }
  save();
  obStep++;
  renderObStep();
}

function skipOnboarding() {
  STATE.onboardingDone = true;
  save();
  finishOnboarding();
}

function finishOnboarding() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  checkCondition();
  renderToday();
  renderPlan();
}

function checkCondition() {
  if (!STATE.onboardingDone) return;
  if (!STATE.conditionLog) STATE.conditionLog = {};
  if (STATE.conditionLog[today()]) return;
  setTimeout(() => { const m=document.getElementById('condition-modal'); if(m) m.style.display='flex'; }, 600);
}
function setCondition(val) {
  document.querySelectorAll('.cond-btn').forEach((b,i) => b.classList.toggle('selected', i+1===val));
  const msgs = ['','😴 많이 피곤하시군요. 강도 60%로 줄일게요.','😓 컨디션 저조. 강도 80%로 조정할게요.','😐 보통이군요! 계획대로 해봐요!','😊 좋은 컨디션! 열심히 합시다!','💪 최고 컨디션! PB에 도전해봐요!'];
  const msgEl = document.getElementById('condition-msg');
  if (msgEl) msgEl.textContent = msgs[val]||'';
  setTimeout(() => {
    STATE.conditionLog[today()] = val; save();
    const m=document.getElementById('condition-modal'); if(m) m.style.display='none';
    if (val<=2) toast(`오늘 운동 강도 ${Math.round(getConditionScale()*100)}%로 조정됐어요 💙`,'info');
    renderToday();
  }, 1000);
}
function getConditionScale() {
  const c = STATE.conditionLog?.[today()]||3;
  if (c<=1) return 0.6; if (c<=2) return 0.8; return 1.0;
}

};

function getExGuide(name) {
  const key = Object.keys(EXERCISE_GUIDE).find(k => name.includes(k.split(' ')[0]) || k.includes(name.split(' ')[0]));
  return key ? EXERCISE_GUIDE[key] : null;
}
function getAlts(guide) {
  if (!guide) return [];
  const injury = STATE.injuryZones||[];
  let alts = [...(guide.alt||[])];
  injury.forEach(z => { if (guide.injury?.[z]) alts = [...guide.injury[z], ...alts.filter(a=>!guide.injury[z].includes(a))]; });
  return alts.slice(0,4);
}

function showPostpone(exIdx, dateKey) {
  const plan=STATE.plan, dow=new Date(dateKey+'T00:00:00').getDay();
  const dayName=['일','월','화','수','목','금','토'][dow];
  const todayPlan=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dayName);
  const ex=todayPlan?.exercises?.[exIdx]; if (!ex) return;
  const dates=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i+1);return{key:d.toISOString().slice(0,10),label:`${d.getMonth()+1}/${d.getDate()} (${'일월화수목금토'[d.getDay()]})`};});
  document.getElementById('postpone-modal-content').innerHTML=`
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;">${ex.name}을 언제로 미룰까요?</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${dates.map(d=>`<button class="btn-ghost" style="margin:0;text-align:left;padding:12px;" onclick="confirmPostpone('${d.key}',${exIdx},'${dateKey}')">📅 ${d.label}</button>`).join('')}
    </div>`;
  document.getElementById('postpone-modal').style.display='flex';
}
function confirmPostpone(targetDate, exIdx, fromDate) {
  const plan=STATE.plan, dow=new Date(fromDate+'T00:00:00').getDay();
  const dayName=['일','월','화','수','목','금','토'][dow];
  const ex=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dayName)?.exercises?.[exIdx];
  if (!ex) return;
  if (!STATE.postponed) STATE.postponed={};
  if (!STATE.postponed[targetDate]) STATE.postponed[targetDate]=[];
  STATE.postponed[targetDate].push({...ex,from:fromDate,exIdx});
  if (!STATE.logs[fromDate]) STATE.logs[fromDate]={};
  STATE.logs[fromDate][exIdx]={postponed:true,sets:[]};
  save(); toast(`📅 ${ex.name} → ${targetDate}로 이동!`,'success');
  document.getElementById('postpone-modal').style.display='none'; renderToday();
}

function completeSet(si) {
  const plan=STATE.plan, dow=new Date().getDay(), dayName=['일','월','화','수','목','금','토'][dow];
  const ex=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dayName)?.exercises?.[_execIdx];
  const tk=today();
  if (!STATE.logs[tk]) STATE.logs[tk]={};
  if (!STATE.logs[tk][_execIdx]) STATE.logs[tk][_execIdx]={sets:[]};
  const reps=parseInt(document.getElementById(`reps-${_execIdx}-${si}`)?.value)||parseInt(ex?.reps)||10;
  const weight=parseFloat(document.getElementById(`wt-${_execIdx}-${si}`)?.value)||0;
  STATE.logs[tk][_execIdx].sets[si]={reps,weight,done:true};
  _execSetIdx=si+1; save();
  startTimer(parseInt(ex?.rest)||90, parseInt(ex?.rest)||90);
  const easyCount=Object.values(STATE.logs[tk]||{}).filter(l=>l.feedback==='easy').length;
  if (easyCount>=3) setTimeout(()=>toast('💪 3개 운동이 쉬웠군요! 다음엔 무게를 늘려볼까요?','success'),600);

}

function nextExec(){const plan=STATE.plan,dow=new Date().getDay(),dayName=['일','월','화','수','목','금','토'][dow];const exes=plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dayName)?.exercises||[];if(_execIdx<exes.length-1){_execIdx++;_execSetIdx=0;stopTimer();renderExec();}else{stopTimer();toast('🎉 오늘 운동 완료!','success');switchTab('today');}}
function startTimer(remain,total){stopTimer();const disp=document.getElementById('timer-display'),fill=document.getElementById('timer-fill');let r=remain;_timerInterval=setInterval(()=>{r--;if(disp)disp.textContent=r+'s';if(fill)fill.style.width=(r/total*100)+'%';if(r<=0){stopTimer();toast('⏱ 휴식 완료! 다음 세트!','info');}},1000);}

      </div>` : ''}
  `;
}

function toggleExercise(dateKey, idx) {
  if (!STATE.logs[dateKey]) STATE.logs[dateKey] = {};
  const plan = STATE.plan;
  const dow = new Date(dateKey+'T00:00:00').getDay();
  const dayName = ['일','월','화','수','목','금','토'][dow];
  const todayPlan = plan?.weeks?.[0]?.days?.find(d=>d.dayOfWeek===dayName);
  const ex = todayPlan?.exercises?.[idx];
  const sets = parseInt(ex?.sets)||3;
  const cur = STATE.logs[dateKey][idx]?.sets?.some(s=>s.done)||false;
  if (!cur) {
    STATE.logs[dateKey][idx] = {sets:Array.from({length:sets},()=>({reps:parseInt(ex?.reps)||10,weight:parseFloat(ex?.weight)||0,done:true,feedback:'normal'}))};
  } else {
    STATE.logs[dateKey][idx] = {sets:[]};
  }
  save(); renderToday();
}

function checkPlanAdjustNeeded() {
  const logs = STATE.workoutLogs || [];
  const recent = logs.slice(-3);
  return recent.length === 3 && recent.every(l => l.completionRate < 0.5);
}

function getNutriLensData() {
  try {
    const raw = localStorage.getItem('nutrilens_fitsync_daily');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.date !== today()) return null; // 오늘 데이터만
    return data;
  } catch { return null; }
}

function renderNutritionMini(nutrData, plan) {
  if (!nutrData) {
    return `<div class="card" style="text-align:center;padding:20px;">
      <div style="font-size:13px;color:var(--t2);margin-bottom:10px;">NutriLens 연동 대기 중</div>
      <div style="font-size:11px;color:var(--t3);line-height:1.7;">NutriLens에서 식단을 기록하면<br>자동으로 여기에 표시됩니다</div>
    </div>`;
  }
  const t = nutrData.totals;
  const goals = computeNutritionGoals(plan);
  const items = [
    { name: '단백질', val: t.protein, goal: goals.protein, unit: 'g', color: '#ff6b6b' },
    { name: '칼로리', val: t.calories, goal: goals.calories, unit: 'kcal', color: 'var(--or)' },
    { name: '탄수화물', val: t.carbs, goal: goals.carbs, unit: 'g', color: '#ffd93d' },
    { name: '지방', val: t.fat, goal: goals.fat, unit: 'g', color: '#6bcb77' },
  ];
  return `<div class="card">
    ${items.map(it => {
      const pct = Math.min((it.val / it.goal) * 100, 100);
      const over = it.val > it.goal * 1.05;
      return `<div class="nutr-row">
        <div class="nutr-dot" style="background:${it.color}"></div>
        <div class="nutr-name">${it.name}</div>
        <div class="nutr-bar-wrap"><div class="nutr-bar" style="width:${pct}%;background:${over ? 'var(--red)' : it.color}"></div></div>
        <div class="nutr-val" style="color:${over ? 'var(--red)' : it.color}">${it.val}/${it.goal}${it.unit}</div>
      </div>`;
    }).join('')}
    ${t.protein < goals.protein * 0.8 ? `
      <div class="banner warn" style="margin-top:10px;">
        <span class="banner-icon">⚡</span>
        <div>단백질 ${goals.protein - t.protein}g 부족 — 운동 후 단백질 보충이 필요해요</div>
      </div>` : ''}
  </div>`;
}

function computeNutritionGoals(plan) {
  const p = STATE.profile || {};
  const w = p.weight || 70;
  const hasMusclGoal = (STATE.goals || []).includes('muscle');
  const protein = Math.round(w * (hasMusclGoal ? 1.8 : 1.4));
  const bmr = p.gender === 'female'
    ? 10 * w + 6.25 * (p.height || 165) - 5 * (p.age || 30) - 161
    : 10 * w + 6.25 * (p.height || 175) - 5 * (p.age || 30) + 5;
  const calories = Math.round(bmr * 1.55) + (hasMusclGoal ? 300 : 0);
  const fat = Math.round(calories * 0.27 / 9);
  const carbs = Math.round((calories - protein * 4 - fat * 9) / 4);
  return { protein, calories, fat, carbs };
}

  if (btn) btn.disabled = true;
  if (loading) loading.style.display = 'block';

  const inbody = STATE.inbodyHistory?.[STATE.inbodyHistory.length-1];
  const goalLabels = {muscle:'근육 증가',diet:'체지방 감소',endurance:'체력 향상',health:'건강 유지'};
  const goalStr = (STATE.goals||['health']).map(g=>goalLabels[g]||g).join(', ');
  const injuryMap = {shoulder:'어깨',knee:'무릎',back:'허리',wrist:'손목',elbow:'팔꿈치',hip:'고관절'};
  const injuryStr = (STATE.injuryZones||[]).map(z=>injuryMap[z]).join(', ')||'없음';
  const dayNames = ['일','월','화','수','목','금','토'];
  const selectedDays = (STATE.preferredDays||[]).map(i=>dayNames[i]).join(', ')||'미설정';

  const system = `당신은 전문 퍼스널 트레이너입니다. 사용자 데이터를 분석해 1주 운동 플랜을 JSON으로만 생성하세요.

{"reason":"플랜 이유 3~5줄 한국어 (인바디 약점, 주의부위 대체, 목표 반영 설명)","weeks":[{"week":1,"days":[{"dayOfWeek":"월","focus":"가슴+삼두","isRest":false,"exercises":[{"name":"벤치프레스","sets":4,"reps":"8-10","weight":"60kg","rest":90,"tip":"팁"}]}]}],"nutritionGuide":{"dailyProtein":140,"dailyCalories":2400,"mealTiming":"운동 후 30분 내 단백질 섭취"}}
규칙:
- reason 필드: 왜 이 플랜인지 상세 설명 필수 (인바디 불균형, 주의부위 대체 운동, 목표 반영 등)
- 선택한 요일만 운동일, 나머지는 isRest:true
- 주의부위 운동 반드시 대안으로 대체하고 reason에 언급
- 인바디 부위별 불균형 시 보완 운동 포함
- JSON만 출력`;

  const userText = `사용자 정보:
나이: ${p.age}세 / 키: ${p.height}cm / 몸무게: ${p.weight}kg / 성별: ${p.gender==='male'?'남':'여'}
주당 운동: ${p.weeklyFreq}회 / 경력: ${p.level==='beginner'?'초급':p.level==='intermediate'?'중급':'고급'} / 목표: ${goalStr}
선호 요일: ${selectedDays} / 주의부위: ${injuryStr}
${inbody?`인바디: 체지방률 ${inbody.fatPct}% / 골격근량 ${inbody.muscleMass}kg / BMI ${inbody.bmi}
${inbody.rightArm&&inbody.leftArm?`팔 불균형: 오른팔 ${inbody.rightArm}kg / 왼팔 ${inbody.leftArm}kg`:''}
${inbody.rightLeg&&inbody.leftLeg?`다리 불균형: 오른다리 ${inbody.rightLeg}kg / 왼다리 ${inbody.leftLeg}kg`:''}`:''} `;

  try {
    const text = await callClaude({system, userText, maxTokens:2500});
    const result = tryJSON(text);
    if (!result?.weeks?.length) throw new Error('플랜 파싱 실패');
    _pendingPlan = {...result, generatedAt:today()};
    toast('✅ 플랜 초안 생성! 검토 후 확정해주세요','success');
    renderPlan();
  } catch(e) {
    toast('플랜 생성 실패: '+e.message,'error');
  } finally {
    if (btn) btn.disabled=false;
    if (loading) loading.style.display='none';
  }
}

function renderProgress() {
  const el = document.getElementById('view-progress');
  const days7 = last7Days();

    const total = todayPlan?.exercises?.length||0;
    const done = total ? Object.keys(log).filter(k=>log[k]?.sets?.some(s=>s.done)).length : 0;
    return {date:d,done,total,rate:total?done/total:0};
  });
  const totalDays = weekData.filter(d=>d.total>0).length;
  const avgRate = totalDays ? weekData.filter(d=>d.total>0).reduce((s,d)=>s+d.rate,0)/totalDays : 0;

  const plan = STATE.plan;
  days7.forEach(d=>{
    const log = STATE.logs[d]||{};
    const dow = new Date(d+'T00:00:00').getDay();

    (todayPlan?.exercises||[]).forEach((ex,i)=>{
      if (log[i]?.sets?.some(s=>s.done)) {

      <div class="stat-box"><div class="stat-num" style="color:var(--grn);">${Math.round(avgRate*100)}%</div><div class="stat-lbl">주간 완료율</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--blu);">${STATE.plan?.adjustmentCount||0}</div><div class="stat-lbl">플랜 생성 횟수</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--yel);">${STATE.inbodyHistory?.length||0}</div><div class="stat-lbl">인바디 기록</div></div>
    </div>

    <!-- 주간 운동 바 -->
    <div class="sec-label">이번 주 운동 현황</div>
    <div class="card">
      <div class="week-bars">
        ${weekData.map(d=>{
          const isToday=d.date===today();
          const h=d.total?Math.max(d.rate*52,d.total>0?4:0):0;
          const color=d.rate===0?'var(--bd2)':d.rate>=0.8?'var(--grn)':d.rate>=0.5?'var(--or)':'var(--red)';

    <div class="card">
      <div class="card-title"><span>💪</span> 부위별 주간 세트수</div>

function calcRM() {
  const w = parseFloat(document.getElementById('rm-weight')?.value)||0;
  const r = parseInt(document.getElementById('rm-reps')?.value)||0;
  const res = document.getElementById('rm-result');
  if (!res) return;
  if (!w||!r||r<1) { res.innerHTML='<div style="font-size:12px;color:var(--t2);">무게와 횟수를 입력하세요</div>'; return; }
  const rm1 = r===1 ? w : Math.round(w*(1+r/30)*10)/10;
  res.innerHTML=`
    <div style="font-family:var(--display);font-size:44px;color:var(--or);line-height:1;">${rm1}<span style="font-size:16px;color:var(--t2)">kg</span></div>
    <div style="font-size:10px;color:var(--t2);margin-top:4px;">추정 1RM</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;">
      ${[[95,'1RM'],[85,'3RM'],[80,'5RM'],[75,'8RM'],[70,'10RM'],[65,'12RM']].map(([pct,label])=>
        `<div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px;text-align:center;">
          <div style="font-family:var(--mono);font-size:13px;font-weight:700;">${Math.round(rm1*pct/100*2)/2}kg</div>
          <div style="font-size:9px;color:var(--t3);">${label} (${pct}%)</div>
        </div>`).join('')}
    </div>`;
}

function calcStreak() {
  let streak = 0;
  const today_d = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today_d);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const log = STATE.logs[key];
    if (log && Object.values(log).some(v => v.done)) streak++;
    else break;
  }
  return streak;
}

function switchInbodyChart(key) {
  const history = STATE.inbodyHistory||[];
  if (history.length<2) return;
  document.querySelectorAll('[id^="chart-btn-"]').forEach(b=>b.classList.remove('active'));
  const cb = document.getElementById('chart-btn-'+key);
  if (cb) cb.classList.add('active');

  const labels = {weight:'체중(kg)',fatPct:'체지방률(%)',muscleMass:'골격근량(kg)',bmi:'BMI',fatMassKg:'체지방량(kg)'};
  const targets = STATE.planTargets;
  const vals = history.map(h=>parseFloat(h[key])||0);
  const minV = Math.min(...vals)*0.97, maxV = Math.max(...vals)*1.03;
  const range = maxV-minV||1;
  const W=280, H=110, PAD=8;
  const x=(i)=>PAD+(i/(history.length-1||1))*(W-PAD*2)+PAD;
  const y=(v)=>H-PAD-(v-minV)/range*(H-PAD*2);

  const tgt = targets?.[key];
  const tgtY = tgt?y(tgt):null;

  const pts = history.map((h,i)=>`${x(i)},${y(parseFloat(h[key])||0)}`).join(' ');
  const areaPath = `M${x(0)},${H} `+history.map((h,i)=>`L${x(i)},${y(parseFloat(h[key])||0)}`).join(' ')+` L${x(history.length-1)},${H} Z`;

  const svg = `<svg viewBox="0 0 ${W+PAD*2} ${H+PAD}" style="width:100%;min-width:260px;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--or)" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="var(--or)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${tgtY?`<rect x="${PAD}" y="${tgtY-8}" width="${W}" height="16" fill="rgba(57,224,122,.08)" rx="4"/>
    <line x1="${PAD}" y1="${tgtY}" x2="${W+PAD}" y2="${tgtY}" stroke="var(--grn)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${W+PAD-2}" y="${tgtY-3}" fill="var(--grn)" font-size="8" text-anchor="end">목표${tgt}</text>`:''}
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <polyline points="${pts}" fill="none" stroke="var(--or)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${history.map((h,i)=>{
      const vv=parseFloat(h[key])||0;
      return`<circle cx="${x(i)}" cy="${y(vv)}" r="4" fill="var(--or)" stroke="var(--bg)" stroke-width="2"/>
      <text x="${x(i)}" y="${y(vv)-8}" fill="var(--t2)" font-size="8" text-anchor="middle">${vv}</text>
      <text x="${x(i)}" y="${H+PAD-1}" fill="var(--t3)" font-size="7" text-anchor="middle">${h.date.slice(5)}</text>`;
    }).join('')}
  </svg>`;

  const el = document.getElementById('inbody-chart-svg');
  if (el) el.innerHTML = `<div style="font-size:10px;color:var(--t2);margin-bottom:6px;font-family:var(--mono);">${labels[key]||key}</div>${svg}`;
}

async function handleInbodyNew(input) {
  const file = input.files[0]; if (!file) return;
  const zone = document.getElementById('inbody-zone');
  const proofSection = document.getElementById('inbody-proof-section');
  zone.innerHTML = `<span class="uz-icon">⏳</span><h3>분석 중...</h3><p>잠시 기다려주세요</p>`;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const b64 = await optimizeImage(e.target.result);
      const text = await callClaude({
        system: `당신은 InBody 체성분 분석기 결과지 전문 판독사입니다.
이미지를 분석할 때 반드시 아래 4단계 방법을 순서대로 적용하세요.

━━━ 1단계: 레이블 우선 읽기 ━━━
각 숫자를 읽기 전에 반드시 해당 행의 레이블 텍스트를 먼저 확인하세요.

━━━ 2단계: InBody 섹션별 구조 파악 ━━━
[체성분분석] "체지방" 또는 "Body Fat Mass" → fatMassKg (kg)
[골격근·지방분석] "골격근량" 또는 "Skeletal Muscle Mass" → muscleMass (kg)
[비만분석] "BMI" → bmi / "체지방률" 또는 "Percent Body Fat" (%) → fatPct
[부위별] 오른팔→rightArm / 왼팔→leftArm / 몸통→torso / 오른다리→rightLeg / 왼다리→leftLeg

━━━ 3단계: 단위로 교차검증 ━━━
fatPct(%): 3~60 범위 / muscleMass(kg): 10~60 범위 / bmi: 10~50 범위 / weight(kg): 30~200 범위

━━━ 4단계: 논리적 일관성 검증 ━━━
fatPct(%) ≈ fatMassKg/weight×100 (대략 일치해야 함)
muscleMass < weight / torso > rightLeg > rightArm

혼동 금지: 체지방량(kg) ≠ 체지방률(%) / 골격근량 ≠ 체지방량 / BMI ≠ 체지방률

JSON만 출력:
{"weight":0,"fatPct":0,"muscleMass":0,"fatMassKg":0,"bmi":0,"bmr":0,"visceralFat":0,"bodyWater":0,"rightArm":0,"leftArm":0,"torso":0,"rightLeg":0,"leftLeg":0}`,
        userText:'이 InBody 결과지를 4개 섹션 구조에 따라 정확히 분석하여 JSON만 출력하세요.',
        imageBase64:b64, maxTokens:800
      });
      const result = tryJSON(text);
      if (!result) throw new Error('파싱 실패');
      // Proof Reading UI 표시
      showInbodyProofReading(result);
      zone.innerHTML = `<span class="uz-icon">✅</span><h3>추출 완료</h3><p>아래에서 값을 확인·수정 후 저장하세요</p><input type="file" id="inbody-file-new" accept="image/*" style="display:none" onchange="handleInbodyNew(this)">`;
    } catch(e) {
      toast('분석 실패: '+e.message,'error');
      zone.innerHTML = `<span class="uz-icon">📋</span><h3>다시 시도</h3><p>${e.message}</p><input type="file" id="inbody-file-new" accept="image/*" style="display:none" onchange="handleInbodyNew(this)">`;
    }
  };
  reader.readAsDataURL(file);
}

function showInbodyProofReading(data) {
  const section = document.getElementById('inbody-proof-section');
  if (!section) return;
  section.style.display = 'block';

  const fields = [
    {key:'weight',label:'체중',unit:'kg',min:30,max:200},
    {key:'fatPct',label:'체지방률',unit:'%',min:3,max:60},
    {key:'muscleMass',label:'골격근량',unit:'kg',min:10,max:60},
    {key:'fatMassKg',label:'체지방량',unit:'kg',min:2,max:60},
    {key:'bmi',label:'BMI',unit:'',min:10,max:50},
    {key:'bmr',label:'기초대사량',unit:'kcal',min:800,max:3000},
    {key:'visceralFat',label:'내장지방',unit:'lv',min:1,max:20},
    {key:'bodyWater',label:'체수분',unit:'L',min:20,max:60},
    {key:'rightArm',label:'오른팔',unit:'kg',min:1,max:8},
    {key:'leftArm',label:'왼팔',unit:'kg',min:1,max:8},
    {key:'torso',label:'몸통',unit:'kg',min:15,max:40},
    {key:'rightLeg',label:'오른다리',unit:'kg',min:5,max:20},
    {key:'leftLeg',label:'왼다리',unit:'kg',min:5,max:20},
  ];

  // 논리 검증
  function validateField(key, val, d) {
    const f = fields.find(x=>x.key===key);
    if (!f||!val) return 'neutral';
    if (val<f.min||val>f.max) return 'warn';
    if (key==='fatPct'&&d.fatMassKg&&d.weight) {
      const calc = d.fatMassKg/d.weight*100;
      if (Math.abs(calc-val)>5) return 'warn';
    }
    return 'ok';
  }

  section.innerHTML = `
    <div class="card" style="border-color:rgba(255,92,43,.3);">
      <div class="card-title"><span>🔍</span> Proof Reading — 값 확인 후 저장</div>
      <div class="banner info" style="margin-bottom:12px;">
        <span class="banner-icon">💡</span>
        <div>⚠️ 표시된 값을 직접 수정할 수 있습니다. 논리적으로 이상한 값을 확인하세요.</div>
      </div>
      ${fields.map(f=>{
        const val = data[f.key]||0;
        const status = validateField(f.key, val, data);
        const statusIcon = status==='warn'?'⚠️':status==='ok'?'✅':'○';
        return`<div class="proof-row">
          <div class="proof-label">${f.label}${f.unit?' ('+f.unit+')':''}</div>
          <input type="number" class="proof-input ${status==='warn'?'warn':status==='ok'?'ok':''}"
            id="proof-${f.key}" value="${val}" step="0.1"
            oninput="updateProofStatus('${f.key}',this.value)">
          <div class="proof-status" id="status-${f.key}">${statusIcon}</div>
        </div>`;
      }).join('')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;">
        <button class="btn-ghost" style="margin:0;" onclick="document.getElementById('inbody-proof-section').style.display='none'">취소</button>
        <button class="btn-primary" onclick="saveProofData()">✅ 저장하기</button>
      </div>
    </div>`;
}

function updateProofStatus(key, val) {
  const f = [{key:'weight',min:30,max:200},{key:'fatPct',min:3,max:60},{key:'muscleMass',min:10,max:60},{key:'fatMassKg',min:2,max:60},{key:'bmi',min:10,max:50},{key:'bmr',min:800,max:3000},{key:'visceralFat',min:1,max:20},{key:'bodyWater',min:20,max:60},{key:'rightArm',min:1,max:8},{key:'leftArm',min:1,max:8},{key:'torso',min:15,max:40},{key:'rightLeg',min:5,max:20},{key:'leftLeg',min:5,max:20}].find(x=>x.key===key);
  const input = document.getElementById('proof-'+key);
  const status = document.getElementById('status-'+key);
  if (!f||!input||!status) return;
  const v = parseFloat(val)||0;
  if (v&&(v<f.min||v>f.max)) { input.classList.add('warn'); input.classList.remove('ok'); status.textContent='⚠️'; }
  else if (v) { input.classList.remove('warn'); input.classList.add('ok'); status.textContent='✅'; }
}

function saveProofData() {
  const keys = ['weight','fatPct','muscleMass','fatMassKg','bmi','bmr','visceralFat','bodyWater','rightArm','leftArm','torso','rightLeg','leftLeg'];
  const data = {date:today(), source:'inbody'};
  keys.forEach(k=>{
    const el = document.getElementById('proof-'+k);
    if (el) data[k] = parseFloat(el.value)||0;
  });
  if (!data.weight) { toast('체중은 필수입니다','warn'); return; }
  if (!STATE.inbodyHistory) STATE.inbodyHistory=[];
  // 같은 날짜 업데이트 or 추가
  const idx = STATE.inbodyHistory.findIndex(h=>h.date===today());
  if (idx>=0) STATE.inbodyHistory[idx]=data; else STATE.inbodyHistory.push(data);
  save();
  toast('✅ 인바디 데이터 저장 완료!','success');
  document.getElementById('inbody-proof-section').style.display='none';
  renderInbody();
}

function renderMuscleBalance() {
  const inbody = STATE.inbodyHistory?.[STATE.inbodyHistory.length - 1];
  if (!inbody?.rightArm) return `
    <div class="banner info">
      <span class="banner-icon">💡</span>
      <div>인바디를 업로드하면 부위별 근육 불균형을 분석합니다</div>
    </div>`;

  const segs = [
    { name: '오른팔', val: inbody.rightArm },
    { name: '왼팔', val: inbody.leftArm },
    { name: '몸통', val: inbody.torso },
    { name: '오른다리', val: inbody.rightLeg },
    { name: '왼다리', val: inbody.leftLeg },
  ].filter(s => s.val);

  if (!segs.length) return '';
  const maxVal = Math.max(...segs.map(s => s.val));
  const armDiff = inbody.rightArm && inbody.leftArm ? Math.abs(inbody.rightArm - inbody.leftArm) : 0;

  return `
    <div class="sec-label">부위별 근육 분포</div>
    <div class="card">
      <div class="card-title"><span>🦾</span> 인바디 기반 불균형 분석</div>
      ${segs.map(s => {
        const pct = s.val / maxVal * 100;
        return `<div class="prog-row">
          <div class="prog-label">${s.name}</div>
          <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:var(--or)"></div></div>
          <div class="prog-val" style="color:var(--or)">${s.val}kg</div>
        </div>`;
      }).join('')}
      ${armDiff > 0.3 ? `<div class="banner warn" style="margin-top:10px;"><span class="banner-icon">⚠️</span><div>팔 좌우 불균형 ${armDiff.toFixed(1)}kg — 플랜에 보완 운동 포함됩니다</div></div>` : ''}
    </div>`;
}

        <div class="form-row"><label class="form-label">주당운동횟수</label><select class="form-select" id="set-freq">${[1,2,3,4,5,6].map(n=>`<option value="${n}" ${(p.weeklyFreq||4)===n?'selected':''}>${n}회</option>`).join('')}</select></div>
      </div>
      <div class="form-row"><label class="form-label">경력</label><select class="form-select" id="set-level"><option value="beginner" ${p.level==='beginner'?'selected':''}>초급 (1년 미만)</option><option value="intermediate" ${p.level==='intermediate'?'selected':''}>중급 (1~3년)</option><option value="advanced" ${p.level==='advanced'?'selected':''}>고급 (3년+)</option></select></div>
      <button class="btn-primary" style="margin-top:10px;" onclick="saveProfile()">프로필 저장</button>
    </div>

    <!-- 선호 요일 -->
    <div class="card">
      <div class="card-title"><span>📅</span> 운동 요일</div>
      <div class="day-select-grid">
        ${['월','화','수','목','금','토','일'].map((d,i)=>{const sel=(STATE.preferredDays||[]).includes(i);return`<button class="day-btn ${sel?'active':''}" onclick="toggleDayPlan(${i},this)">${d}</button>`;}).join('')}
      </div>
      <div style="font-size:11px;color:var(--t2);text-align:center;margin-top:4px;" id="settings-day-msg">${(STATE.preferredDays||[]).length}개 선택됨</div>
    </div>

    <!-- 주의 부위 -->
    <div class="card">
      <div class="card-title"><span>🚨</span> 주의 부위</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${[['shoulder','어깨'],['knee','무릎'],['back','허리'],['wrist','손목'],['elbow','팔꿈치'],['hip','고관절']].map(([k,l])=>`
          <button class="btn-sm ${(STATE.injuryZones||[]).includes(k)?'active':''}" style="${(STATE.injuryZones||[]).includes(k)?'background:var(--redD);border-color:var(--red);color:var(--red);':''}" onclick="toggleInjuryPlan('${k}',this)">${l}</button>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--t2);margin-top:8px;line-height:1.6;">선택된 부위는 운동 가이드에서 자동으로 대안을 먼저 보여줍니다</div>
    </div>

    <!-- 운동 목표 -->
    <div class="card">
      <div class="card-title"><span>🎯</span> 운동 목표</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${[['muscle','💪 근육증가'],['diet','🔥 체지방감소'],['endurance','🏃 체력향상'],['health','❤️ 건강유지']].map(([k,l])=>`
          <button class="btn-sm ${(STATE.goals||[]).includes(k)?'active':''}" onclick="toggleGoalSettings('${k}',this)">${l}</button>`).join('')}
      </div>
    </div>

    <!-- 데이터 관리 -->
    <div class="card">
      <div class="card-title"><span>🗑️</span> 데이터 관리</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn-ghost" style="margin:0;" onclick="resetLogs()">운동 기록만 초기화</button>
        <button class="btn-ghost" style="margin:0;border-color:var(--red);color:var(--red);" onclick="resetAll()">전체 초기화</button>
      </div>
    </div>

    <!-- 앱 정보 -->
    <div class="card">
      <div class="card-title"><span>ℹ️</span> 앱 정보</div>
      <div class="setting-row"><span class="setting-key">버전</span><span class="setting-val">FitSync v2.0</span></div>
      <div class="setting-row"><span class="setting-key">플랜 생성</span><span class="setting-val">${STATE.plan?.adjustmentCount||0}회</span></div>
      <div class="setting-row"><span class="setting-key">인바디 기록</span><span class="setting-val">${STATE.inbodyHistory?.length||0}회</span></div>
    </div>
  `;
}

function saveApiKey() { const k=document.getElementById('set-apikey')?.value?.trim(); if(k){setApiKey(k);toast('API 키 저장 완료','success');} }
function saveProfile() {
  const age=+document.getElementById('set-age')?.value, height=+document.getElementById('set-height')?.value, weight=+document.getElementById('set-weight')?.value;
  if (!age||!height||!weight){toast('나이, 키, 몸무게를 입력해주세요','warn');return;}
  STATE.profile={...(STATE.profile||{}),age,height,weight,weeklyFreq:+document.getElementById('set-freq')?.value,level:document.getElementById('set-level')?.value};
  save(); toast('프로필 저장 완료','success');
}
function toggleGoalSettings(key,el) {
  if (!STATE.goals) STATE.goals=[];
  const i=STATE.goals.indexOf(key);
  if (i>=0){STATE.goals.splice(i,1);el.classList.remove('active');}else{STATE.goals.push(key);el.classList.add('active');}
  save();
}
function resetLogs(){if(confirm('운동 기록을 초기화할까요?')){STATE.logs={};STATE.workoutLogs=[];STATE.conditionLog={};save();toast('운동 기록 초기화 완료','success');}}
function resetAll(){if(confirm('모든 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')){Object.assign(STATE,{...SEED});save();location.reload();}}

// ════════════════════════════════════════════════════════
// 앱 초기화
// ════════════════════════════════════════════════════════
if (STATE.onboardingDone) {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  checkCondition();
  renderToday();
} else {
  renderObStep();
}
</script>
</body>
</html>
